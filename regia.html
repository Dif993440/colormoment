<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR MOMENT — REGIA</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body {
width:100%; height:100%; overflow:hidden;
background:#030508 !important;
color:#8aa4c8;
font-family:‘Segoe UI’,system-ui,-apple-system,sans-serif;
font-size:13px;
}

/* ── MAIN GRID ── */
.app {
display:grid;
grid-template-rows:52px 1fr 200px 44px;
height:100vh;
background:#030508;
gap:1px;
}

/* ── HEADER ── */
.header {
background:#080d1a;
border-bottom:1px solid #162035;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
gap:16px;
}

.logo {
font-size:1.1rem;
font-weight:700;
letter-spacing:.25em;
text-transform:uppercase;
color:#d0e4ff;
white-space:nowrap;
}
.logo em { color:#0057ff; font-style:normal; }
.version { font-size:.6rem; color:#1a2a45; letter-spacing:.15em; margin-left:8px; }

.header-center { display:flex; align-items:center; gap:12px; flex:1; justify-content:center; }

.pill {
display:flex; align-items:center; gap:7px;
padding:4px 14px;
background:#0a0e18;
border:1px solid #162035;
font-size:.68rem; letter-spacing:.15em; text-transform:uppercase; color:#4a6a98;
}
.pill .v { color:#0057ff; font-weight:700; font-size:.85rem; }

.dot { width:7px; height:7px; border-radius:50%; background:#162035; flex-shrink:0; }
.dot.live { background:#00e676; box-shadow:0 0 8px #00e676; animation:pd 2s infinite; }
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}

.audio-badge {
font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
color:#ffaa00; padding:3px 10px; border:1px solid #3a2a00; background:#1a1200;
}

.header-right { display:flex; align-items:center; gap:8px; }

/* ── MIDDLE ROW ── */
.middle {
display:grid;
grid-template-columns:1fr 300px;
background:#030508;
gap:1px;
min-height:0;
}

/* ── STADIUM ── */
.stadium {
background:#040810;
position:relative;
overflow:hidden;
}
.stadium canvas { position:absolute; inset:0; width:100%; height:100%; }
.stadium-tag {
position:absolute; top:12px; left:14px;
font-size:.6rem; letter-spacing:.2em; text-transform:uppercase;
color:rgba(255,255,255,.12);
}
.beat-ring {
position:absolute; top:50%; left:50%;
transform:translate(-50%,-50%);
width:180px; height:180px;
border-radius:50%;
border:1px solid rgba(0,87,255,.08);
pointer-events:none;
transition:all .08s;
}
.beat-ring.hit {
border-color:rgba(0,87,255,.7);
box-shadow:0 0 50px rgba(0,87,255,.3);
transform:translate(-50%,-50%) scale(1.2);
}

/* ── BEAT PANEL ── */
.beat-panel {
background:#080d1a;
border-left:1px solid #162035;
display:flex;
flex-direction:column;
overflow-y:auto;
}

.bp-section {
padding:12px 14px;
border-bottom:1px solid #0f1826;
flex-shrink:0;
}

.section-title {
font-size:.58rem; letter-spacing:.25em; text-transform:uppercase;
color:#1a2a45; margin-bottom:10px;
}

/* BPM */
.bpm-row { display:flex; align-items:baseline; gap:6px; margin-bottom:6px; }
.bpm-big {
font-size:3.2rem; font-weight:700; line-height:1;
color:#c0d8f8; letter-spacing:-.02em;
transition:color .08s;
}
.bpm-big.flash { color:#0057ff; }
.bpm-unit { font-size:.6rem; letter-spacing:.2em; color:#4a6a98; text-transform:uppercase; }
.bpm-conf { margin-left:auto; font-size:.6rem; color:#3a5a88; }

/* Beat meter */
.beat-meter { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.beat-led {
width:9px; height:9px; border-radius:50%;
background:#0f1826; flex-shrink:0;
transition:background .04s, box-shadow .04s;
}
.beat-led.on { background:#00e676; box-shadow:0 0 12px #00e676; }
.meter-track { flex:1; height:3px; background:#0f1826; border-radius:2px; overflow:hidden; }
.meter-fill { height:100%; width:0; background:#0057ff; border-radius:2px; transition:width .05s; }
.meter-fill.hot { background:#e8000d; }
.meter-num { font-size:.6rem; color:#3a5a88; min-width:26px; text-align:right; }

/* Waveform */
.wave-wrap {
height:64px; background:#040810;
border:1px solid #0f1826; position:relative; overflow:hidden;
margin-bottom:6px;
}
#waveCanvas { width:100%; height:100%; display:block; }

/* Grid */
.grid-wrap {
height:24px; background:#040810;
border:1px solid #0f1826; overflow:hidden;
}
#gridCanvas { width:100%; height:100%; display:block; }

/* Toggles */
.toggle-row {
display:flex; align-items:center; justify-content:space-between;
margin-bottom:8px;
}
.tl { font-size:.7rem; color:#8aa4c8; }
.ts { font-size:.58rem; color:#3a5a88; }
.sw { position:relative; width:36px; height:20px; flex-shrink:0; }
.sw input { opacity:0; width:0; height:0; }
.sw-track {
position:absolute; inset:0; background:#0f1826;
border-radius:10px; cursor:pointer; transition:.2s;
border:1px solid #162035;
}
.sw-track::before {
content:’’; position:absolute;
width:12px; height:12px; left:3px; top:3px;
border-radius:50%; background:#3a5a88; transition:.2s;
}
.sw input:checked + .sw-track { background:#0057ff; border-color:#0057ff; }
.sw input:checked + .sw-track::before { transform:translateX(16px); background:#fff; }

/* Slider */
.sl-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.sl-label { font-size:.6rem; letter-spacing:.1em; color:#4a6a98; text-transform:uppercase; white-space:nowrap; }
.sl-val { font-size:.65rem; color:#0057ff; min-width:30px; text-align:right; }
input[type=range] {
-webkit-appearance:none; flex:1; height:2px;
background:#162035; outline:none; border-radius:1px;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance:none; width:10px; height:10px;
border-radius:50%; background:#0057ff; cursor:pointer;
}

/* Buttons small */
.btn-xs {
padding:5px 10px;
font-size:.62rem; letter-spacing:.1em; font-weight:600; text-transform:uppercase;
border:1px solid #162035; background:#0a0e18; color:#6a8ab8;
cursor:pointer; transition:all .12s; white-space:nowrap;
}
.btn-xs:hover { border-color:#0057ff; color:#c0d8f8; }
.btn-xs.tap:active { background:#0057ff; color:#fff; border-color:#0057ff; }
.btn-xs.red:hover { border-color:#e8000d; color:#e8000d; }
.btn-xs.green { border-color:#00e676; color:#00e676; }
.btn-xs.green:hover { background:#00e676; color:#000; }
.btn-row { display:flex; gap:6px; flex-wrap:wrap; }

/* ── BOTTOM ROW ── */
.bottom {
display:grid;
grid-template-columns:1fr 1fr 260px;
background:#030508;
gap:1px;
}
.bottom-cell {
background:#080d1a;
padding:14px 16px;
display:flex;
flex-direction:column;
}

/* Color grid */
.color-grid {
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
flex:1;
}
.cbtn {
border:2px solid transparent;
cursor:pointer;
font-size:.62rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
transition:all .12s;
display:flex; align-items:center; justify-content:center;
min-height:44px;
}
.cbtn:hover { filter:brightness(1.15); transform:scale(1.02); }
.cbtn.sel { border-color:#fff !important; box-shadow:0 0 18px rgba(255,255,255,.2); transform:scale(1.05); }
.cbtn[data-c=“blu”]    { background:#0057ff; color:#fff; }
.cbtn[data-c=“rosso”]  { background:#e8000d; color:#fff; }
.cbtn[data-c=“bianco”] { background:#e8f0ff; color:#111; }
.cbtn[data-c=“verde”]  { background:#00c853; color:#000; }
.cbtn[data-c=“viola”]  { background:#aa00ff; color:#fff; }
.cbtn[data-c=“giallo”] { background:#ffd600; color:#000; }

/* Effect grid */
.fx-grid {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
flex:1;
}
.fxbtn {
border:1px solid #162035; background:#0a0e18; color:#5a7a9a;
cursor:pointer;
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:3px;
font-size:.6rem; letter-spacing:.08em; text-transform:uppercase;
transition:all .12s;
min-height:44px;
}
.fxbtn .ico { font-size:1rem; }
.fxbtn:hover { border-color:#0057ff; color:#c0d8f8; background:rgba(0,87,255,.06); }
.fxbtn.sel { border-color:#0057ff; background:rgba(0,87,255,.14); color:#fff; }

/* GO panel */
.go-cell {
display:flex; flex-direction:column; gap:8px;
}

#goBtn {
flex:1;
background:linear-gradient(135deg,#0057ff 0%,#003ab3 100%);
border:none;
font-size:1.8rem; font-weight:800; letter-spacing:.3em; color:#fff;
cursor:pointer; text-transform:uppercase;
position:relative; overflow:hidden;
transition:all .12s;
min-height:80px;
}
#goBtn:hover { box-shadow:0 0 40px rgba(0,87,255,.6); }
#goBtn:active { transform:scale(.97); }
#goBtn.bp { box-shadow:0 0 60px rgba(0,87,255,.9) !important; }
#goBtn::after {
content:’’; position:absolute; inset:0;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
transform:translateX(-100%);
}
#goBtn:hover::after { animation:sh .4s forwards; }
@keyframes sh{to{transform:translateX(100%)}}

.go-sub { display:flex; gap:6px; }

#blackoutBtn {
flex:1; height:32px;
background:transparent; border:1px solid #162035;
font-size:.65rem; letter-spacing:.15em; color:#4a6a98;
cursor:pointer; text-transform:uppercase; transition:all .15s;
}
#blackoutBtn:hover { border-color:#e8000d; color:#e8000d; }
#blackoutBtn.on { background:#e8000d; border-color:#e8000d; color:#fff; box-shadow:0 0 20px rgba(232,0,13,.4); }

.qr-btn {
width:32px; height:32px;
background:#0a0e18; border:1px solid #162035;
display:flex; align-items:center; justify-content:center;
cursor:pointer; color:#4a6a98; font-size:.6rem;
position:relative;
}
.qr-btn:hover .qr-pop { display:block; }
.qr-pop {
display:none; position:absolute; bottom:38px; right:0;
background:#080d1a; border:1px solid #162035; padding:8px; z-index:200;
}

/* ── FOOTER ── */
.footer {
background:#05070e;
border-top:1px solid #0d1826;
display:flex; align-items:center; justify-content:space-between;
padding:0 18px;
}
.f-stat { font-size:.6rem; letter-spacing:.1em; color:#1a2a45; }
.f-stat span { color:#4a6a98; }
.latency-group { display:flex; align-items:center; gap:10px; }
.latency-label { font-size:.6rem; letter-spacing:.1em; color:#3a5a88; text-transform:uppercase; }
.latency-val { font-size:.65rem; color:#0057ff; min-width:42px; }
#latSlider { width:100px; }

/* ── TOAST ── */
.toast {
position:fixed; bottom:60px; left:50%;
transform:translateX(-50%) translateY(10px);
background:#080d1a; border:1px solid #1a2a45;
padding:8px 24px; font-size:.7rem; letter-spacing:.1em;
color:#c0d8f8; opacity:0; transition:all .25s; pointer-events:none;
text-transform:uppercase; z-index:9000;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

</head>

<script>
// ══════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════
const CFG = {
  apiKey:"AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain:"color-moment-3e8ac.firebaseapp.com",
  databaseURL:"https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"color-moment-3e8ac",
  storageBucket:"color-moment-3e8ac.firebasestorage.app",
  messagingSenderId:"330719548656",
  appId:"1:330719548656:web:b0d5d63615a1998b2b5e35"
};

const COLORS = {
  blu:'#0057ff', rosso:'#e8000d', bianco:'#e8f0ff',
  verde:'#00c853', viola:'#aa00ff', giallo:'#ffd600'
};

let db = null;
let colorKey = 'blu';
let fxKey = 'solid';
let isBlackout = false;
let audioCtx = null, analyser = null, audioSrc = null, stream = null;
let raf = null;
let beatCount = 0, lastBeatTs = 0, latComp = 0;

// Beat engine
const beatHist = [], energyHist = [];
let bpm = 0, gridInterval = 0, lastGridBeat = 0;
let adaptThresh = 0.5;
let tapTimes = [];

// Stadium
const sCvs = document.getElementById('stadiumCanvas');
const sCtx = sCvs.getContext('2d');
const crowd = [];
let stadColor = '#000000', beatFlash = 0;

// Wave/grid
const wCvs = document.getElementById('waveCanvas');
const wCtx = wCvs.getContext('2d');
const gCvs = document.getElementById('gridCanvas');
const gCtx = gCvs.getContext('2d');

// ══════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════
try {
  firebase.initializeApp(CFG);
  db = firebase.database();

  // Keepalive
  setInterval(() => db.ref('.info/serverTimeOffset').once('value'), 5*60*1000);

  db.ref('.info/connected').on('value', s => {
    const ok = s.val();
    document.getElementById('connDot').className = 'dot' + (ok?' live':'');
    document.getElementById('connText').textContent = ok ? 'LIVE' : 'OFFLINE';
  });

  db.ref('fans/count').on('value', s => {
    document.getElementById('fanCount').textContent = s.val() || 0;
  });

} catch(e) { toast('Errore Firebase: ' + e.message); }

function push(cmd) { if(db) db.ref('state').set(cmd); }
function pushBeat(hex) { if(db) db.ref('beat').set({ts:Date.now(), colorHex:hex}); }

// ══════════════════════════════════════════════
// STADIUM CANVAS
// ══════════════════════════════════════════════
function initStadium() {
  for (let i = 0; i < 280; i++) {
    const a = Math.random()*Math.PI*2;
    const r = 0.28 + Math.random()*0.22;
    crowd.push({
      x: 0.5 + Math.cos(a)*r*0.85,
      y: 0.42 + Math.sin(a)*r*0.52,
      s: 1.4 + Math.random()*1.5,
      ph: Math.random()*Math.PI*2,
      br: 0.2 + Math.random()*0.6
    });
  }
  function resz() { sCvs.width=sCvs.offsetWidth; sCvs.height=sCvs.offsetHeight; }
  resz(); window.addEventListener('resize', resz);
  drawStadium();
}

function drawStadium() {
  requestAnimationFrame(drawStadium);
  const W=sCvs.width, H=sCvs.height;
  sCtx.clearRect(0,0,W,H);

  // Bg
  const bg = sCtx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,W*.6);
  bg.addColorStop(0,'rgba(0,15,50,.9)');
  bg.addColorStop(1,'rgba(0,0,0,1)');
  sCtx.fillStyle=bg; sCtx.fillRect(0,0,W,H);

  // Color overlay
  if (!isBlackout && stadColor !== '#000000') {
    const {r,g,b} = hRgb(stadColor);
    const ov = sCtx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,W*.7);
    ov.addColorStop(0,`rgba(${r},${g},${b},${.12+beatFlash*.35})`);
    ov.addColorStop(1,`rgba(${r},${g},${b},.01)`);
    sCtx.fillStyle=ov; sCtx.fillRect(0,0,W,H);
  }

  beatFlash = Math.max(0, beatFlash - .05);

  // Crowd
  const t = Date.now()/1000;
  const {r,g,b} = hRgb(isBlackout?'#111111':stadColor);
  for (const p of crowd) {
    const px=p.x*W, py=p.y*H;
    const fl = .5+.5*Math.sin(t*1.8+p.ph);
    const al = p.br*(isBlackout?.04:(.25+fl*.4+beatFlash*.4));
    sCtx.beginPath();
    sCtx.arc(px,py,p.s*(1+beatFlash*.5),0,Math.PI*2);
    sCtx.fillStyle=`rgba(${r},${g},${b},${al.toFixed(2)})`;
    sCtx.fill();
  }

  // Rings
  sCtx.strokeStyle='rgba(0,87,255,.07)'; sCtx.lineWidth=1;
  for(let i=1;i<=3;i++){
    sCtx.beginPath();
    sCtx.ellipse(W/2,H*.42,W*.36*i/3,H*.25*i/3,0,0,Math.PI*2);
    sCtx.stroke();
  }
}

// ══════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════
async function startAux() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,channelCount:2}
    });
    setupAudio(s,'aux');
  } catch(e) { toast('AUX non disponibile — usa MIC'); }
}

async function startMic() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    setupAudio(s,'mic');
  } catch(e) { toast('Permesso microfono negato'); }
}

function setupAudio(s, mode) {
  stopAudio();
  stream = s;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = .75;
  audioSrc = audioCtx.createMediaStreamSource(s);
  audioSrc.connect(analyser);

  document.getElementById('auxBtn').style.cssText = mode==='aux'?'background:#0057ff;color:#fff;border-color:#0057ff':'';
  document.getElementById('micBtn').style.cssText = mode==='mic'?'background:#0057ff;color:#fff;border-color:#0057ff':'';
  document.getElementById('audioBadge').textContent = mode==='aux'?'⚡ AUX IN':'🎙 MICROFONO';
  document.getElementById('srcLabel').textContent = mode.toUpperCase();

  runAnalysis();
  toast(mode==='aux'?'AUX IN attivo':'Microfono attivo');
}

function stopAudio() {
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(audioSrc) audioSrc.disconnect();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=analyser=audioSrc=stream=null;
  document.getElementById('auxBtn').style.cssText='';
  document.getElementById('micBtn').style.cssText='';
  document.getElementById('audioBadge').textContent='NO AUDIO';
  document.getElementById('srcLabel').textContent='--';
}

// ══════════════════════════════════════════════
// BEAT ENGINE
// ══════════════════════════════════════════════
function runAnalysis() {
  const fft = new Uint8Array(analyser.frequencyBinCount);
  const td  = new Float32Array(analyser.fftSize);

  function loop() {
    raf = requestAnimationFrame(loop);
    analyser.getByteFrequencyData(fft);
    analyser.getFloatTimeDomainData(td);

    const now = Date.now();
    const binHz = audioCtx.sampleRate / analyser.fftSize;
    const lo = Math.floor(60/binHz), hi = Math.floor(180/binHz);

    let sum = 0;
    for(let i=lo;i<=hi;i++) sum+=fft[i];
    const energy = sum/((hi-lo+1)*255);

    // Adaptive threshold
    energyHist.push(energy);
    if(energyHist.length>80) energyHist.shift();
    const avg = energyHist.reduce((a,b)=>a+b,0)/energyHist.length;
    const sens = parseInt(document.getElementById('sensSlider').value);
    adaptThresh = avg * (1.3 + (10-sens)*.12);

    // UI meter
    const pct = Math.min(100, energy*200);
    const mf = document.getElementById('meterFill');
    mf.style.width = pct+'%';
    mf.className = 'meter-fill'+(energy>adaptThresh?' hot':'');
    document.getElementById('meterNum').textContent = Math.round(energy*100);

    // Onset
    const minGap = bpm>0?(60000/bpm)*.65:240;
    if(energy>adaptThresh && (now-lastBeatTs)>minGap) {
      lastBeatTs = now;
      onBeat(now);
    }

    // Grid prediction
    if(document.getElementById('gridLock').checked && gridInterval>0) {
      const next = lastGridBeat + gridInterval;
      if(Math.abs(now-next)<35 && now>=next-35) {
        lastGridBeat = next;
        if((now-lastBeatTs)>120) onBeat(now, true);
      }
    }

    drawWave(td, energy);
    drawGrid(now);

    // Footer
    const ago = now-lastBeatTs;
    document.getElementById('lastBeat').textContent = lastBeatTs>0&&ago<60000?(ago/1000).toFixed(1)+'s':'--';
  }
  loop();
}

function onBeat(ts, predicted=false) {
  beatCount++;
  document.getElementById('beatCount').textContent = beatCount;

  // LED flash
  const led = document.getElementById('beatLed');
  led.classList.add('on');
  setTimeout(()=>led.classList.remove('on'),90);

  // BPM flash
  const bpmEl = document.getElementById('bpmNum');
  bpmEl.classList.add('flash');
  setTimeout(()=>bpmEl.classList.remove('flash'),70);

  // Ring + stadium
  const ring = document.getElementById('beatRing');
  ring.classList.add('hit');
  setTimeout(()=>ring.classList.remove('hit'),110);
  beatFlash = 1.0;

  // GO pulse
  const go = document.getElementById('goBtn');
  go.classList.add('bp');
  setTimeout(()=>go.classList.remove('bp'),140);

  // BPM calc
  beatHist.push(ts);
  if(beatHist.length>16) beatHist.shift();
  if(beatHist.length>=4) calcBPM();

  // Auto send
  if(document.getElementById('autoBeat').checked && !isBlackout) {
    const d = Math.max(0, latComp);
    setTimeout(()=>pushBeat(COLORS[colorKey]), d);
  }
}

function calcBPM() {
  if(beatHist.length<4) return;
  const ivs=[];
  for(let i=1;i<beatHist.length;i++) ivs.push(beatHist[i]-beatHist[i-1]);
  ivs.sort((a,b)=>a-b);
  const med=ivs[Math.floor(ivs.length/2)];
  const filt=ivs.filter(i=>Math.abs(i-med)<med*.3);
  if(filt.length<2) return;
  const avg=filt.reduce((a,b)=>a+b)/filt.length;
  const nb=Math.round(60000/avg);
  if(nb>40&&nb<220){
    bpm=nb; gridInterval=avg;
    lastGridBeat=beatHist[beatHist.length-1];
    document.getElementById('bpmNum').textContent=bpm;
    document.getElementById('bpmConf').textContent=Math.round(filt.length/ivs.length*100)+'%';
  }
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function drawWave(td, energy) {
  wCvs.width=wCvs.offsetWidth; wCvs.height=wCvs.offsetHeight;
  const W=wCvs.width,H=wCvs.height;
  wCtx.clearRect(0,0,W,H);
  wCtx.beginPath();
  wCtx.strokeStyle=`rgba(0,87,255,${.35+energy*2})`;
  wCtx.lineWidth=1.5;
  const step=W/td.length;
  for(let i=0;i<td.length;i++){
    const x=i*step, y=(1-(td[i]+1)/2)*H;
    i===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);
  }
  wCtx.stroke();
  // Threshold
  const ty=H*(1-adaptThresh*1.5);
  wCtx.setLineDash([3,3]);
  wCtx.strokeStyle='rgba(255,170,0,.25)';
  wCtx.lineWidth=1;
  wCtx.beginPath();
  wCtx.moveTo(0,ty); wCtx.lineTo(W,ty);
  wCtx.stroke();
  wCtx.setLineDash([]);
}

function drawGrid(now) {
  gCvs.width=gCvs.offsetWidth; gCvs.height=gCvs.offsetHeight;
  const W=gCvs.width,H=gCvs.height;
  gCtx.fillStyle='#040810'; gCtx.fillRect(0,0,W,H);
  const win=4000, ppm=W/win;
  // Past beats
  for(const ts of beatHist){
    const age=now-ts; if(age>win) continue;
    const x=W-age*ppm, al=1-age/win;
    gCtx.beginPath(); gCtx.arc(x,H/2,3.5,0,Math.PI*2);
    gCtx.fillStyle=`rgba(0,87,255,${al})`; gCtx.fill();
  }
  // Predicted
  if(gridInterval>0){
    let pt=lastGridBeat;
    for(let i=0;i<10;i++){
      pt+=gridInterval;
      const age=now-pt; if(age>win) continue;
      const x=W-age*ppm;
      const al=age<0?.7:(1-age/win)*.35;
      const col=age<0?`rgba(0,230,118,${al})`:`rgba(255,170,0,${al})`;
      gCtx.save(); gCtx.translate(x,H/2); gCtx.rotate(Math.PI/4);
      gCtx.fillStyle=col; gCtx.fillRect(-2.5,-2.5,5,5);
      gCtx.restore();
    }
  }
  // Now line
  gCtx.strokeStyle='rgba(255,255,255,.1)'; gCtx.lineWidth=1;
  gCtx.beginPath(); gCtx.moveTo(W,0); gCtx.lineTo(W,H); gCtx.stroke();
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
function selColor(btn) {
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  colorKey = btn.dataset.c;
  if(!isBlackout) stadColor = COLORS[colorKey];
}

function selFx(btn) {
  document.querySelectorAll('.fxbtn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  fxKey = btn.dataset.f;
}

function sendCommand() {
  if(isBlackout){toggleBlackout();return;}
  push({type:'command',color:colorKey,colorHex:COLORS[colorKey],effect:fxKey,blackout:false,ts:Date.now()});
  stadColor = COLORS[colorKey];
  const go=document.getElementById('goBtn');
  go.style.boxShadow='0 0 60px '+COLORS[colorKey];
  setTimeout(()=>go.style.boxShadow='',400);
  toast('▶ '+colorKey.toUpperCase()+' — '+fxKey.toUpperCase());
}

function toggleBlackout() {
  isBlackout=!isBlackout;
  document.getElementById('blackoutBtn').classList.toggle('on',isBlackout);
  if(isBlackout){
    stadColor='#000000';
    push({type:'command',blackout:true,ts:Date.now()});
  } else {
    stadColor=COLORS[colorKey];
    push({type:'command',blackout:false,color:colorKey,colorHex:COLORS[colorKey],effect:fxKey,ts:Date.now()});
  }
}

function tapTempo() {
  const now=Date.now();
  tapTimes.push(now);
  if(tapTimes.length>8) tapTimes.shift();
  if(tapTimes.length>=2){
    const ivs=[];
    for(let i=1;i<tapTimes.length;i++) ivs.push(tapTimes[i]-tapTimes[i-1]);
    const avg=ivs.reduce((a,b)=>a+b)/ivs.length;
    bpm=Math.round(60000/avg);
    gridInterval=avg; lastGridBeat=now;
    document.getElementById('bpmNum').textContent=bpm;
    document.getElementById('bpmConf').textContent='TAP';
    toast('TAP BPM: '+bpm);
  }
}

function resetGrid() {
  beatHist.length=0; energyHist.length=0; tapTimes.length=0;
  bpm=0; gridInterval=0;
  document.getElementById('bpmNum').textContent='---';
  document.getElementById('bpmConf').textContent='--';
  toast('Grid resettata');
}

function syncNow() {
  lastGridBeat=Date.now();
  toast('SYNC ✓');
}

// Sliders
document.getElementById('sensSlider').addEventListener('input',function(){
  document.getElementById('sensVal').textContent=this.value;
});
document.getElementById('latSlider').addEventListener('input',function(){
  latComp=parseInt(this.value);
  document.getElementById('latVal').textContent=(latComp>=0?'+':'')+latComp+'ms';
});

// QR
function initQR() {
  const url=window.location.href.replace('regia.html','fan.html');
  try { new QRCode(document.getElementById('qrPop'),{text:url,width:110,height:110,colorDark:'#fff',colorLight:'#080d1a',correctLevel:QRCode.CorrectLevel.M}); }
  catch(e){}
}

// Toast
let toastTimer;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// Footer beat timer
setInterval(()=>{
  const ago=Date.now()-lastBeatTs;
  document.getElementById('lastBeat').textContent=lastBeatTs>0&&ago<60000?(ago/1000).toFixed(1)+'s':'--';
},100);

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function hRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:255,g:255,b:255};
}

document.querySelector('[data-c="blu"]').classList.add('sel');
document.querySelector('[data-f="solid"]').classList.add('sel');
initStadium();
initQR();
