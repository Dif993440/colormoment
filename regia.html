<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR MOMENT — Regia Centrale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
–bg: #04060e;
–panel: #080d1a;
–panel2: #0c1220;
–border: #162035;
–border2: #1e2d4a;
–text: #8aa4c8;
–text-bright: #c8dcf5;
–accent: #0057ff;
–accent2: #e8000d;
–green: #00e676;
–c-blu: #0057ff;
–c-rosso: #e8000d;
–c-bianco: #f0f4ff;
–c-verde: #00c853;
–c-viola: #aa00ff;
–c-giallo: #ffd600;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Barlow Condensed’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Noise overlay */
body::before {
content:’’;
position:fixed; inset:0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events:none;
z-index:0;
opacity:.4;
}

/* ── HEADER ── */
header {
position: sticky; top:0; z-index:200;
background: var(–panel);
border-bottom: 1px solid var(–border2);
padding: 0 28px;
height: 56px;
display: flex;
align-items: center;
justify-content: space-between;
backdrop-filter: blur(12px);
}

.logo {
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: 1.25rem;
letter-spacing: .2em;
background: linear-gradient(90deg, var(–c-blu) 0%, #4d9fff 50%, var(–c-rosso) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.header-right {
display: flex;
align-items: center;
gap: 20px;
}

.status-pill {
display: flex;
align-items: center;
gap: 7px;
padding: 5px 14px;
background: var(–panel2);
border: 1px solid var(–border2);
border-radius: 2px;
font-size: .72rem;
letter-spacing: .18em;
text-transform: uppercase;
color: var(–text);
}

.status-pill .dot {
width: 7px; height: 7px;
border-radius: 50%;
background: #333;
transition: background .3s, box-shadow .3s;
}
.status-pill .dot.connected {
background: var(–green);
box-shadow: 0 0 8px var(–green);
animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
0%,100% { opacity:1; } 50% { opacity:.5; }
}

.fan-count {
font-family: ‘Oswald’, sans-serif;
font-size: 1.1rem;
font-weight: 600;
color: var(–text-bright);
letter-spacing: .05em;
}
.fan-count span { color: var(–accent); }

/* ── LAYOUT ── */
.main {
position: relative; z-index:1;
display: grid;
grid-template-columns: 1fr 340px;
grid-template-rows: auto auto;
gap: 2px;
min-height: calc(100vh - 56px);
}

/* ── PANEL BASE ── */
.panel {
background: var(–panel);
border: 1px solid var(–border);
padding: 24px;
}

.panel-label {
font-size: .65rem;
letter-spacing: .25em;
text-transform: uppercase;
color: #334;
margin-bottom: 16px;
padding-bottom: 10px;
border-bottom: 1px solid var(–border);
}

/* ── STADIUM PREVIEW ── */
.stadium-panel {
grid-column: 1;
grid-row: 1;
min-height: 320px;
display: flex;
flex-direction: column;
position: relative;
overflow: hidden;
background: #000;
padding: 0;
}

.stadium-bg {
position: absolute; inset: 0;
background:
radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,30,80,.8) 0%, #000 100%);
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

/* Simulated stadium rings */
.stadium-rings {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
}

.ring {
position: absolute;
border-radius: 50%;
border: 2px solid transparent;
animation: ring-pulse 3s ease-in-out infinite;
}
.ring:nth-child(1) { width:60%; height:40%; border-color: rgba(0,87,255,.15); }
.ring:nth-child(2) { width:80%; height:55%; border-color: rgba(0,87,255,.1); animation-delay: .4s; }
.ring:nth-child(3) { width:95%; height:68%; border-color: rgba(0,87,255,.07); animation-delay: .8s; }

@keyframes ring-pulse {
0%,100% { opacity:.5; } 50% { opacity:1; }
}

.stadium-color-overlay {
position: absolute; inset: 0;
opacity: 0;
transition: opacity .1s;
mix-blend-mode: screen;
}

.stadium-label {
position: absolute; top: 18px; left: 22px;
font-size: .6rem;
letter-spacing: .25em;
text-transform: uppercase;
color: rgba(255,255,255,.3);
}

.stadium-effect-label {
position: absolute; bottom: 18px; left: 50%;
transform: translateX(-50%);
font-family: ‘Oswald’, sans-serif;
font-size: 1.6rem;
font-weight: 700;
letter-spacing: .3em;
color: rgba(255,255,255,.0);
text-transform: uppercase;
transition: color .2s;
white-space: nowrap;
}

/* Particle dots simulating crowd phones */
.crowd-dots {
position: absolute; inset: 0;
pointer-events: none;
}
.crowd-dot {
position: absolute;
width: 2px; height: 2px;
border-radius: 50%;
background: rgba(255,255,255,.3);
transition: background .15s, box-shadow .15s;
}

/* ── BEAT METER ── */
.beat-panel {
grid-column: 1;
grid-row: 2;
padding: 20px 24px;
}

.beat-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}

.beat-title {
font-size: .65rem;
letter-spacing: .25em;
text-transform: uppercase;
color: #334;
}

.beat-controls {
display: flex;
align-items: center;
gap: 12px;
}

#micBtn {
padding: 7px 18px;
font-family: ‘Oswald’, sans-serif;
font-size: .75rem;
letter-spacing: .15em;
font-weight: 600;
border: 1px solid var(–border2);
background: var(–panel2);
color: var(–text);
cursor: pointer;
text-transform: uppercase;
transition: all .2s;
clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
#micBtn.active {
background: var(–accent);
border-color: var(–accent);
color: #fff;
box-shadow: 0 0 20px rgba(0,87,255,.4);
}
#micBtn:hover { filter: brightness(1.2); }

.sensitivity-wrap {
display: flex; align-items: center; gap: 8px;
}
.sensitivity-wrap label {
font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(–text);
}
#sensitivity {
-webkit-appearance: none;
width: 80px; height: 3px;
background: var(–border2);
border-radius: 2px;
outline: none;
}
#sensitivity::-webkit-slider-thumb {
-webkit-appearance: none;
width: 12px; height: 12px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
}

.beat-viz {
display: flex;
align-items: flex-end;
gap: 3px;
height: 60px;
background: var(–panel2);
border: 1px solid var(–border);
padding: 4px 6px;
}

.beat-bar {
flex: 1;
background: var(–border2);
border-radius: 1px;
transition: height .05s, background .05s;
min-height: 2px;
}

.bpm-display {
margin-top: 10px;
display: flex;
align-items: baseline;
gap: 8px;
}
.bpm-num {
font-family: ‘Oswald’, sans-serif;
font-size: 2rem;
font-weight: 700;
color: var(–text-bright);
line-height: 1;
}
.bpm-label {
font-size: .65rem;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text);
}
.beat-flash-indicator {
width: 10px; height: 10px;
border-radius: 50%;
background: #222;
transition: background .05s, box-shadow .05s;
margin-left: auto;
}
.beat-flash-indicator.flash {
background: var(–green);
box-shadow: 0 0 16px var(–green);
}

/* ── RIGHT SIDEBAR ── */
.sidebar {
grid-column: 2;
grid-row: 1 / 3;
display: flex;
flex-direction: column;
gap: 2px;
border-left: 1px solid var(–border);
}

/* ── COLORI ── */
.colors-panel { flex-shrink: 0; }

.color-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}

.color-btn {
height: 44px;
border: 2px solid transparent;
cursor: pointer;
font-family: ‘Oswald’, sans-serif;
font-size: .7rem;
font-weight: 600;
letter-spacing: .15em;
text-transform: uppercase;
transition: all .15s;
position: relative;
overflow: hidden;
clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
}
.color-btn::after {
content: ‘’;
position: absolute; inset: 0;
background: rgba(255,255,255,0);
transition: background .15s;
}
.color-btn:hover::after { background: rgba(255,255,255,.1); }
.color-btn.selected {
border-color: #fff;
box-shadow: 0 0 20px currentColor, inset 0 0 20px rgba(255,255,255,.1);
transform: scale(1.03);
}
.color-btn[data-color=“blu”]    { background: var(–c-blu); color: #fff; }
.color-btn[data-color=“rosso”]  { background: var(–c-rosso); color: #fff; }
.color-btn[data-color=“bianco”] { background: var(–c-bianco); color: #111; }
.color-btn[data-color=“verde”]  { background: var(–c-verde); color: #000; }
.color-btn[data-color=“viola”]  { background: var(–c-viola); color: #fff; }
.color-btn[data-color=“giallo”] { background: var(–c-giallo); color: #000; }

/* ── EFFETTI ── */
.effects-panel { flex-shrink: 0; }

.effects-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}

.effect-btn {
height: 64px;
border: 1px solid var(–border2);
background: var(–panel2);
color: var(–text);
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
transition: all .15s;
font-family: ‘Oswald’, sans-serif;
font-size: .65rem;
letter-spacing: .12em;
text-transform: uppercase;
clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
}
.effect-btn .icon { font-size: 1.3rem; }
.effect-btn:hover {
border-color: var(–accent);
color: var(–text-bright);
background: rgba(0,87,255,.08);
}
.effect-btn.selected {
border-color: var(–accent);
background: rgba(0,87,255,.15);
color: #fff;
box-shadow: 0 0 16px rgba(0,87,255,.25);
}

/* ── AUTO BEAT TOGGLE ── */
.autobeat-panel { flex-shrink: 0; padding: 16px 24px; }

.autobeat-row {
display: flex;
align-items: center;
justify-content: space-between;
}
.autobeat-label {
font-size: .75rem;
letter-spacing: .12em;
text-transform: uppercase;
color: var(–text-bright);
line-height: 1.3;
}
.autobeat-sub {
font-size: .65rem;
color: var(–text);
letter-spacing: .05em;
text-transform: none;
}

.toggle {
position: relative;
width: 44px; height: 24px;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
position: absolute; inset:0;
background: var(–border2);
border-radius: 12px;
cursor: pointer;
transition: .2s;
}
.toggle-slider::before {
content:’’;
position: absolute;
width: 16px; height: 16px;
left: 4px; top: 4px;
border-radius: 50%;
background: var(–text);
transition: .2s;
}
.toggle input:checked + .toggle-slider { background: var(–accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

/* ── GO / BLACKOUT ── */
.control-panel {
flex-shrink: 0;
padding: 16px 24px;
display: flex;
flex-direction: column;
gap: 10px;
margin-top: auto;
border-top: 1px solid var(–border2);
}

#goBtn {
width: 100%;
height: 64px;
background: linear-gradient(135deg, #0057ff, #003db3);
border: none;
font-family: ‘Oswald’, sans-serif;
font-size: 1.6rem;
font-weight: 700;
letter-spacing: .25em;
color: #fff;
cursor: pointer;
clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
transition: all .15s;
position: relative;
overflow: hidden;
text-transform: uppercase;
}
#goBtn::before {
content:’’;
position: absolute; inset:0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
transform: translateX(-100%);
}
#goBtn:hover { box-shadow: 0 0 40px rgba(0,87,255,.6); }
#goBtn:hover::before { animation: shine .4s forwards; }
@keyframes shine { to { transform: translateX(100%); } }
#goBtn:active { transform: scale(.97); }

#blackoutBtn {
width: 100%;
height: 40px;
background: transparent;
border: 1px solid var(–border2);
font-family: ‘Oswald’, sans-serif;
font-size: .8rem;
letter-spacing: .25em;
color: var(–text);
cursor: pointer;
text-transform: uppercase;
clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
transition: all .15s;
}
#blackoutBtn:hover {
border-color: var(–accent2);
color: var(–accent2);
box-shadow: 0 0 20px rgba(232,0,13,.2);
}
#blackoutBtn.active {
background: var(–accent2);
border-color: var(–accent2);
color: #fff;
box-shadow: 0 0 30px rgba(232,0,13,.5);
}

/* ── FIREBASE SETUP MODAL ── */
#setupModal {
position: fixed; inset:0;
background: rgba(0,0,0,.92);
z-index: 9999;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(8px);
}
#setupModal.hidden { display: none; }

.modal-box {
background: var(–panel);
border: 1px solid var(–border2);
width: 520px;
max-width: 95vw;
padding: 40px;
}

.modal-box h2 {
font-family: ‘Oswald’, sans-serif;
font-size: 1.6rem;
font-weight: 700;
letter-spacing: .15em;
color: var(–text-bright);
margin-bottom: 6px;
}
.modal-box .sub {
font-size: .85rem;
color: var(–text);
line-height: 1.5;
margin-bottom: 24px;
}

.step {
display: flex;
gap: 14px;
margin-bottom: 16px;
align-items: flex-start;
}
.step-num {
width: 26px; height: 26px;
border-radius: 50%;
background: var(–accent);
color: #fff;
font-family: ‘Oswald’, sans-serif;
font-weight: 700;
font-size: .85rem;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
margin-top: 2px;
}
.step-text {
font-size: .85rem;
line-height: 1.5;
color: var(–text);
}
.step-text a { color: var(–accent); }
.step-text code {
background: var(–panel2);
border: 1px solid var(–border2);
padding: 1px 6px;
border-radius: 2px;
font-size: .8rem;
color: var(–text-bright);
}

.config-input {
width: 100%;
background: var(–panel2);
border: 1px solid var(–border2);
color: var(–text-bright);
padding: 12px 14px;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: .85rem;
letter-spacing: .03em;
margin-top: 16px;
outline: none;
transition: border-color .2s;
height: 120px;
resize: none;
}
.config-input:focus { border-color: var(–accent); }
.config-input::placeholder { color: #334; }

.modal-btns {
display: flex;
gap: 10px;
margin-top: 20px;
}

.btn-primary {
flex: 1;
height: 46px;
background: var(–accent);
border: none;
font-family: ‘Oswald’, sans-serif;
font-size: .9rem;
letter-spacing: .15em;
font-weight: 600;
color: #fff;
cursor: pointer;
text-transform: uppercase;
clip-path: polygon(7px 0%, 100% 0%, calc(100% - 7px) 100%, 0% 100%);
transition: all .2s;
}
.btn-primary:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(0,87,255,.4); }

.btn-secondary {
height: 46px;
padding: 0 20px;
background: transparent;
border: 1px solid var(–border2);
font-family: ‘Oswald’, sans-serif;
font-size: .8rem;
letter-spacing: .12em;
color: var(–text);
cursor: pointer;
text-transform: uppercase;
clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
transition: all .2s;
}
.btn-secondary:hover { border-color: var(–text); color: var(–text-bright); }

.error-msg {
color: var(–accent2);
font-size: .78rem;
margin-top: 8px;
display: none;
}

/* ── TOAST ── */
.toast {
position: fixed;
bottom: 30px; left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–panel);
border: 1px solid var(–border2);
padding: 12px 28px;
font-size: .8rem;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text-bright);
opacity: 0;
transition: all .3s;
pointer-events: none;
z-index: 9000;
clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* QR Section */
.qr-panel { flex-shrink: 0; text-align: center; }
#qrcode { margin: 12px auto; display: inline-block; }
#qrcode canvas { border: 4px solid var(–border2); }
.qr-url {
font-size: .65rem;
color: var(–text);
letter-spacing: .05em;
word-break: break-all;
}

</style>
</head>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<!-- SCRIPTS -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let selectedColor = 'blu';
let selectedEffect = 'solid';
let isBlackout = false;
let demoMode = false;
let firebaseDB = null;
let micStream = null;
let audioCtx = null;
let analyser = null;
let micActive = false;
let autoBeat = false;
let beatHistory = [];
let lastBeatTime = 0;
let animFrame = null;

const colorMap = {
  blu:    '#0057ff',
  rosso:  '#e8000d',
  bianco: '#f0f4ff',
  verde:  '#00c853',
  viola:  '#aa00ff',
  giallo: '#ffd600'
};

// ─────────────────────────────────────────
// CROWD DOTS GENERATION
// ─────────────────────────────────────────
function generateCrowd() {
  const container = document.getElementById('crowdDots');
  const N = 220;
  for (let i = 0; i < N; i++) {
    const dot = document.createElement('div');
    dot.className = 'crowd-dot';
    // Distribute in elliptical stadium shape
    const angle = Math.random() * Math.PI * 2;
    const r = 0.28 + Math.random() * 0.22;
    const x = 50 + Math.cos(angle) * r * 90;
    const y = 38 + Math.sin(angle) * r * 55;
    if (x < 2 || x > 98 || y < 2 || y > 95) continue;
    dot.style.left = x + '%';
    dot.style.top = y + '%';
    dot.style.opacity = (0.2 + Math.random() * 0.6).toFixed(2);
    container.appendChild(dot);
  }
}
generateCrowd();

// ─────────────────────────────────────────
// BEAT VIZ BARS
// ─────────────────────────────────────────
const beatViz = document.getElementById('beatViz');
const BARS = 48;
const bars = [];
for (let i = 0; i < BARS; i++) {
  const b = document.createElement('div');
  b.className = 'beat-bar';
  beatViz.appendChild(b);
  bars.push(b);
}

// ─────────────────────────────────────────
// FIREBASE — AUTO INIT (config hardcoded)
// ─────────────────────────────────────────
const FIREBASE_CFG = {
  apiKey: "AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain: "color-moment-3e8ac.firebaseapp.com",
  databaseURL: "https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "color-moment-3e8ac",
  storageBucket: "color-moment-3e8ac.firebasestorage.app",
  messagingSenderId: "330719548656",
  appId: "1:330719548656:web:b0d5d63615a1998b2b5e35"
};

function loadFirebase() {
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';
    s2.onload = () => {
      try {
        firebase.initializeApp(FIREBASE_CFG);
        firebaseDB = firebase.database();
        onConnected();
      } catch(e) {
        document.getElementById('statusText').textContent = 'ERRORE: ' + e.message;
      }
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

function onConnected() {
  document.getElementById('statusDot').classList.add('connected');
  document.getElementById('statusText').textContent = 'CONNESSO';

  // Listen for fan count
  firebaseDB.ref('fans/count').on('value', snap => {
    document.getElementById('fanCount').textContent = snap.val() || 0;
  });

  setupQR();
  showToast('Firebase connesso ✓');
}

// Auto-start on load
loadFirebase();

// ─────────────────────────────────────────
// QR CODE
// ─────────────────────────────────────────
function setupQR() {
  const fanUrl = window.location.href.replace('regia.html', 'fan.html');
  document.getElementById('fanUrl').textContent = fanUrl;
  new QRCode(document.getElementById('qrcode'), {
    text: fanUrl,
    width: 130,
    height: 130,
    colorDark: '#ffffff',
    colorLight: '#080d1a',
    correctLevel: QRCode.CorrectLevel.M
  });
}

// ─────────────────────────────────────────
// COLOR / EFFECT SELECTION
// ─────────────────────────────────────────
function selectColor(btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedColor = btn.dataset.color;
  updatePreview();
}

function selectEffect(btn) {
  document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEffect = btn.dataset.effect;
  updatePreview();
}

// ─────────────────────────────────────────
// PREVIEW
// ─────────────────────────────────────────
function updatePreview() {
  if (isBlackout) return;
  const overlay = document.getElementById('stadiumOverlay');
  const label = document.getElementById('effectLabel');
  const dots = document.querySelectorAll('.crowd-dot');
  const hex = colorMap[selectedColor] || '#ffffff';

  overlay.style.background = hex;
  overlay.style.opacity = '0.25';
  label.style.color = hex;
  label.textContent = selectedEffect.toUpperCase();

  dots.forEach(d => {
    d.style.background = hex;
    d.style.boxShadow = `0 0 4px ${hex}`;
  });
}

// ─────────────────────────────────────────
// SEND COMMAND
// ─────────────────────────────────────────
function sendCommand() {
  if (isBlackout) { toggleBlackout(); return; }

  const cmd = {
    type: 'command',
    color: selectedColor,
    colorHex: colorMap[selectedColor],
    effect: selectedEffect,
    blackout: false,
    ts: Date.now()
  };

  pushCommand(cmd);
  updatePreview();
  showToast(`Inviato: ${selectedColor.toUpperCase()} — ${selectedEffect.toUpperCase()}`);

  // Flash GO button
  const btn = document.getElementById('goBtn');
  btn.style.boxShadow = `0 0 60px ${colorMap[selectedColor]}`;
  setTimeout(() => btn.style.boxShadow = '', 500);
}

function toggleBlackout() {
  isBlackout = !isBlackout;
  const btn = document.getElementById('blackoutBtn');
  const overlay = document.getElementById('stadiumOverlay');
  const dots = document.querySelectorAll('.crowd-dot');

  if (isBlackout) {
    btn.classList.add('active');
    overlay.style.background = '#000';
    overlay.style.opacity = '0.85';
    document.getElementById('effectLabel').style.color = 'transparent';
    dots.forEach(d => { d.style.background = '#111'; d.style.boxShadow = 'none'; });
    pushCommand({ type: 'command', blackout: true, ts: Date.now() });
  } else {
    btn.classList.remove('active');
    overlay.style.opacity = '0';
    updatePreview();
    pushCommand({ type: 'command', blackout: false, color: selectedColor, colorHex: colorMap[selectedColor], effect: selectedEffect, ts: Date.now() });
  }
}

function pushCommand(cmd) {
  if (demoMode) return;
  if (firebaseDB) {
    firebaseDB.ref('state').set(cmd);
  }
}

function sendBeatFlash() {
  const hex = colorMap[selectedColor];
  if (!demoMode && firebaseDB) {
    firebaseDB.ref('beat').set({ ts: Date.now(), color: selectedColor, colorHex: hex });
  }
  // Visual feedback on dots
  const dots = document.querySelectorAll('.crowd-dot');
  dots.forEach(d => {
    d.style.background = '#fff';
    d.style.boxShadow = `0 0 8px #fff`;
  });
  setTimeout(() => updatePreview(), 120);
}

// ─────────────────────────────────────────
// MICROPHONE & BEAT DETECTION
// ─────────────────────────────────────────
async function toggleMic() {
  if (micActive) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.7;
    source.connect(analyser);
    micActive = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micBtn').textContent = '🎙 MIC ATTIVO';
    drawBeat();
  } catch(e) {
    showToast('Permesso microfono negato');
  }
}

function stopMic() {
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  if (animFrame) cancelAnimationFrame(animFrame);
  micActive = false;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micBtn').textContent = '🎙 ATTIVA MIC';
  document.getElementById('bpmDisplay').textContent = '—';
  bars.forEach(b => { b.style.height = '2px'; b.style.background = 'var(--border2)'; });
}

function drawBeat() {
  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  const sensitivity = parseInt(document.getElementById('sensitivity').value);
  autoBeat = document.getElementById('autoBeatToggle').checked;

  function loop() {
    animFrame = requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);

    // Draw bars
    const sliceW = Math.floor(dataArray.length / BARS);
    for (let i = 0; i < BARS; i++) {
      const val = dataArray[i * sliceW] / 255;
      const h = Math.max(2, val * 56);
      bars[i].style.height = h + 'px';
      const r = Math.floor(val * 80);
      const g = Math.floor(val * 150);
      bars[i].style.background = val > 0.6 ? '#0057ff' : `rgb(${r},${g},200)`;
    }

    // Beat detection: focus on bass frequencies (bins 0-8)
    let bassEnergy = 0;
    for (let i = 0; i < 8; i++) bassEnergy += dataArray[i];
    bassEnergy = bassEnergy / 8;

    const threshold = 255 - (sensitivity * 20); // higher sensitivity = lower threshold
    const now = Date.now();
    const minInterval = 300; // max ~200 BPM

    if (bassEnergy > threshold && (now - lastBeatTime) > minInterval) {
      lastBeatTime = now;
      onBeat(now);
    }

    // Update auto beat ref
    autoBeat = document.getElementById('autoBeatToggle').checked;
  }
  loop();
}

function onBeat(now) {
  // Flash indicator
  const flash = document.getElementById('beatFlash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 120);

  // BPM calc
  beatHistory.push(now);
  if (beatHistory.length > 8) beatHistory.shift();
  if (beatHistory.length >= 2) {
    const intervals = [];
    for (let i = 1; i < beatHistory.length; i++) {
      intervals.push(beatHistory[i] - beatHistory[i-1]);
    }
    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
    const bpm = Math.round(60000 / avg);
    if (bpm > 40 && bpm < 220) {
      document.getElementById('bpmDisplay').textContent = bpm;
    }
  }

  // Auto beat flash to fans
  if (autoBeat && !isBlackout) {
    sendBeatFlash();
  }
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
// Select default
document.querySelector('[data-color="blu"]').classList.add('selected');
document.querySelector('[data-effect="solid"]').classList.add('selected');
</script>

</body>
