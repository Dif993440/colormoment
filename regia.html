<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLOR MOMENT — REGIA</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030508;color:#8aa4c8;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;}

.app{display:grid;grid-template-rows:52px 1fr 44px;height:100vh;background:#030508;gap:1px;}

/* HEADER */
.header{background:#080d1a;border-bottom:1px solid #162035;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;}
.logo{font-size:1.1rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#d0e4ff;}
.logo em{color:#0057ff;font-style:normal;}
.version{font-size:.6rem;color:#1a2a45;letter-spacing:.15em;margin-left:8px;}
.header-center{display:flex;align-items:center;gap:12px;flex:1;justify-content:center;}
.pill{display:flex;align-items:center;gap:7px;padding:4px 14px;background:#0a0e18;border:1px solid #162035;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:#4a6a98;}
.pill .v{color:#0057ff;font-weight:700;font-size:.85rem;}
.dot{width:7px;height:7px;border-radius:50%;background:#162035;flex-shrink:0;}
.dot.live{background:#00e676;box-shadow:0 0 8px #00e676;animation:pd 2s infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.audio-badge{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#ffaa00;padding:3px 10px;border:1px solid #3a2a00;background:#1a1200;}
.header-right{display:flex;align-items:center;gap:8px;}

/* MAIN */
.main{display:grid;grid-template-columns:280px 1fr;gap:1px;min-height:0;overflow:hidden;}

/* BEAT PANEL */
.beat-panel{background:#080d1a;border-right:1px solid #162035;display:flex;flex-direction:column;overflow-y:auto;}
.bp-section{padding:12px 14px;border-bottom:1px solid #0f1826;flex-shrink:0;}
.section-title{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:#1a2a45;margin-bottom:10px;}
.bpm-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
.bpm-big{font-size:3rem;font-weight:700;line-height:1;color:#c0d8f8;letter-spacing:-.02em;transition:color .08s;}
.bpm-big.flash{color:#0057ff;}
.bpm-unit{font-size:.6rem;letter-spacing:.2em;color:#4a6a98;text-transform:uppercase;}
.bpm-conf{margin-left:auto;font-size:.6rem;color:#3a5a88;}
.beat-meter{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.beat-led{width:9px;height:9px;border-radius:50%;background:#0f1826;flex-shrink:0;transition:background .04s,box-shadow .04s;}
.beat-led.on{background:#00e676;box-shadow:0 0 12px #00e676;}
.meter-track{flex:1;height:3px;background:#0f1826;border-radius:2px;overflow:hidden;}
.meter-fill{height:100%;width:0;background:#0057ff;border-radius:2px;transition:width .05s;}
.meter-fill.hot{background:#e8000d;}
.meter-num{font-size:.6rem;color:#3a5a88;min-width:26px;text-align:right;}
.wave-wrap{height:60px;background:#040810;border:1px solid #0f1826;position:relative;overflow:hidden;margin-bottom:6px;}
#waveCanvas{width:100%;height:100%;display:block;}
.grid-wrap{height:22px;background:#040810;border:1px solid #0f1826;overflow:hidden;}
#gridCanvas{width:100%;height:100%;display:block;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tl{font-size:.7rem;color:#8aa4c8;}
.ts{font-size:.58rem;color:#3a5a88;}
.sw{position:relative;width:36px;height:20px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;}
.sw-track{position:absolute;inset:0;background:#0f1826;border-radius:10px;cursor:pointer;transition:.2s;border:1px solid #162035;}
.sw-track::before{content:’’;position:absolute;width:12px;height:12px;left:3px;top:3px;border-radius:50%;background:#3a5a88;transition:.2s;}
.sw input:checked+.sw-track{background:#0057ff;border-color:#0057ff;}
.sw input:checked+.sw-track::before{transform:translateX(16px);background:#fff;}
.sl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sl-label{font-size:.6rem;letter-spacing:.1em;color:#4a6a98;text-transform:uppercase;white-space:nowrap;}
.sl-val{font-size:.65rem;color:#0057ff;min-width:30px;text-align:right;}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:#162035;outline:none;border-radius:1px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#0057ff;cursor:pointer;}
.btn-xs{padding:5px 10px;font-size:.62rem;letter-spacing:.1em;font-weight:600;text-transform:uppercase;border:1px solid #162035;background:#0a0e18;color:#6a8ab8;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-xs:hover{border-color:#0057ff;color:#c0d8f8;}
.btn-xs.red:hover{border-color:#e8000d;color:#e8000d;}
.btn-xs.green{border-color:#00e676;color:#00e676;}
.btn-xs.green:hover{background:#00e676;color:#000;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}

/* ZONES AREA */
.zones-area{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;overflow:hidden;}

/* SINGLE ZONE */
.zone{background:#080d1a;border:2px solid #162035;display:flex;flex-direction:column;padding:12px;gap:8px;position:relative;transition:border-color .2s;}
.zone.active{border-color:#0057ff;box-shadow:0 0 20px rgba(0,87,255,.15);}
.zone-header{display:flex;align-items:center;justify-content:space-between;}
.zone-name{font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#c0d8f8;}
.zone-fans{font-size:.6rem;color:#3a5a88;letter-spacing:.1em;}
.zone-color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
.zcbtn{height:28px;border:2px solid transparent;cursor:pointer;font-size:.5rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:all .1s;display:flex;align-items:center;justify-content:center;}
.zcbtn:hover{filter:brightness(1.15);}
.zcbtn.sel{border-color:#fff !important;transform:scale(1.08);}
.zcbtn[data-c=“blu”]   {background:#0057ff;color:#fff;}
.zcbtn[data-c=“rosso”] {background:#e8000d;color:#fff;}
.zcbtn[data-c=“bianco”]{background:#e8f0ff;color:#111;}
.zcbtn[data-c=“verde”] {background:#00c853;color:#000;}
.zcbtn[data-c=“viola”] {background:#aa00ff;color:#fff;}
.zcbtn[data-c=“giallo”]{background:#ffd600;color:#000;}
.zone-fx-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
.zfxbtn{height:28px;border:1px solid #162035;background:#0a0e18;color:#5a7a9a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .1s;}
.zfxbtn:hover{border-color:#0057ff;color:#c0d8f8;}
.zfxbtn.sel{border-color:#0057ff;background:rgba(0,87,255,.14);color:#fff;}
.zone-bottom{display:flex;gap:6px;align-items:stretch;}
.zone-go{flex:1;height:36px;background:linear-gradient(135deg,#0057ff,#003ab3);border:none;font-size:.8rem;font-weight:700;letter-spacing:.2em;color:#fff;cursor:pointer;text-transform:uppercase;transition:all .12s;}
.zone-go:hover{box-shadow:0 0 20px rgba(0,87,255,.5);}
.zone-go:active{transform:scale(.97);}
.zone-go.bp{box-shadow:0 0 40px rgba(0,87,255,.8)!important;}
.zone-blackout{width:36px;height:36px;background:transparent;border:1px solid #162035;color:#4a6a98;cursor:pointer;font-size:.6rem;transition:all .12s;}
.zone-blackout:hover{border-color:#e8000d;color:#e8000d;}
.zone-blackout.on{background:#e8000d;border-color:#e8000d;color:#fff;}
.zone-qr{width:36px;height:36px;background:#0a0e18;border:1px solid #162035;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4a6a98;font-size:.5rem;position:relative;flex-direction:column;gap:1px;}
.zone-qr:hover .qr-pop{display:block;}
.qr-pop{display:none;position:absolute;bottom:42px;right:0;background:#080d1a;border:1px solid #162035;padding:6px;z-index:200;}

/* FOOTER */
.footer{background:#05070e;border-top:1px solid #0d1826;display:flex;align-items:center;justify-content:space-between;padding:0 18px;}
.f-stat{font-size:.6rem;letter-spacing:.1em;color:#1a2a45;}
.f-stat span{color:#4a6a98;}
.latency-group{display:flex;align-items:center;gap:10px;}
.latency-label{font-size:.6rem;letter-spacing:.1em;color:#3a5a88;text-transform:uppercase;}
.latency-val{font-size:.65rem;color:#0057ff;min-width:42px;}
#latSlider{width:100px;}

/* TOAST */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(10px);background:#080d1a;border:1px solid #1a2a45;padding:8px 24px;font-size:.7rem;letter-spacing:.1em;color:#c0d8f8;opacity:0;transition:all .25s;pointer-events:none;text-transform:uppercase;z-index:9000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BLACKOUT ALL */
#blackoutAllBtn{padding:0 16px;height:32px;background:transparent;border:1px solid #162035;font-size:.65rem;letter-spacing:.15em;color:#4a6a98;cursor:pointer;text-transform:uppercase;transition:all .15s;}
#blackoutAllBtn:hover{border-color:#e8000d;color:#e8000d;}
#blackoutAllBtn.on{background:#e8000d;border-color:#e8000d;color:#fff;box-shadow:0 0 20px rgba(232,0,13,.4);}
</style>

</head>
<body>
<div class="app">

<!-- HEADER -->

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo">Color <em>Moment</em><span class="version">REGIA v3 · ZONE</span></div>

<!-- MAIN -->

<div class="main">

  <!-- ZONES -->

  <div class="zones-area" id="zonesArea"></div>

</div>

<!-- FOOTER -->

<div class="footer">
  <div style="display:flex;gap:20px;">
    <div class="f-stat">SORGENTE: <span id="srcLabel">--</span></div>
    <div class="f-stat">ULTIMO BEAT: <span id="lastBeat">--</span></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const CFG = {
  apiKey:"AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain:"color-moment-3e8ac.firebaseapp.com",
  databaseURL:"https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"color-moment-3e8ac",
  storageBucket:"color-moment-3e8ac.firebasestorage.app",
  messagingSenderId:"330719548656",
  appId:"1:330719548656:web:b0d5d63615a1998b2b5e35"
};

const COLORS = {
  blu:'#0057ff', rosso:'#e8000d', bianco:'#e8f0ff',
  verde:'#00c853', viola:'#aa00ff', giallo:'#ffd600'
};

const ZONE_NAMES = ['A','B','C','D'];
const ZONE_LABELS = ['ZONA A','ZONA B','ZONA C','ZONA D'];

// Stato per zona
const zoneState = {
  A: { color:'blu', fx:'solid', blackout:false },
  B: { color:'rosso', fx:'solid', blackout:false },
  C: { color:'verde', fx:'solid', blackout:false },
  D: { color:'giallo', fx:'solid', blackout:false },
};

let db = null;
let isBlackoutAll = false;
let latComp = 0;
let beatCount = 0, lastBeatTs = 0;

// Beat engine
const beatHist = [], energyHist = [];
let bpm = 0, gridInterval = 0, lastGridBeat = 0;
let adaptThresh = 0.5, tapTimes = [];
let audioCtx = null, analyser = null, audioSrc = null, stream = null, raf = null;

const wCvs = document.getElementById('waveCanvas');
const wCtx = wCvs.getContext('2d');
const gCvs = document.getElementById('gridCanvas');
const gCtx = gCvs.getContext('2d');

// ══════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════
firebase.initializeApp(CFG);
db = firebase.database();
setInterval(() => db.ref('.info/serverTimeOffset').once('value'), 5*60*1000);

db.ref('.info/connected').on('value', s => {
  const ok = s.val();
  document.getElementById('connDot').className = 'dot'+(ok?' live':'');
  document.getElementById('connText').textContent = ok?'LIVE':'OFFLINE';
});

// Fan totali
db.ref('fans').on('value', snap => {
  const fans = snap.val() || {};
  let total = 0;
  ZONE_NAMES.forEach(z => {
    const c = fans['zona'+z]?.count || 0;
    total += c;
    const el = document.getElementById('zfans-'+z);
    if (el) el.textContent = c + ' FAN';
  });
  document.getElementById('fanTotal').textContent = total;
});

function push(path, data) { if(db) db.ref(path).set(data); }

// ══════════════════════════════════════════════
// BUILD ZONES UI
// ══════════════════════════════════════════════
function buildZones() {
  const area = document.getElementById('zonesArea');
  ZONE_NAMES.forEach(z => {
    const st = zoneState[z];
    const div = document.createElement('div');
    div.className = 'zone';
    div.id = 'zone-'+z;
    div.innerHTML = `
      <div class="zone-header">
        <div class="zone-name">${ZONE_LABELS[ZONE_NAMES.indexOf(z)]}</div>
        <div class="zone-fans" id="zfans-${z}">0 FAN</div>
      </div>
      <div class="zone-color-grid">
        ${['blu','rosso','bianco','verde','viola','giallo'].map(c =>
          `<button class="zcbtn${st.color===c?' sel':''}" data-c="${c}" data-z="${z}" onclick="selZoneColor(this)">${c.substring(0,3).toUpperCase()}</button>`
        ).join('')}
      </div>
      <div class="zone-fx-grid">
        ${[['solid','■'],['flash','⚡'],['wave','〰'],['rainbow','🌈'],['pulse','◎'],['fade','◑']].map(([f,ico]) =>
          `<button class="zfxbtn${st.fx===f?' sel':''}" data-f="${f}" data-z="${z}" onclick="selZoneFx(this)" title="${f}">${ico}</button>`
        ).join('')}
      </div>
      <div class="zone-bottom">
        <button class="zone-go" id="zgo-${z}" onclick="sendZone('${z}')">GO ${z}</button>
        <button class="zone-blackout" id="zbo-${z}" onclick="toggleZoneBlackout('${z}')">⬛</button>
        <div class="zone-qr" title="QR Zona ${z}">
          <span>QR</span><span>${z}</span>
          <div class="qr-pop" id="qrpop-${z}"></div>
        </div>
      </div>
    `;
    area.appendChild(div);
  });
  initQRs();
}

// ══════════════════════════════════════════════
// QR CODES
// ══════════════════════════════════════════════
function initQRs() {
  const base = window.location.href.replace('regia.html','fan.html');
  ZONE_NAMES.forEach(z => {
    const url = base + '?zona=' + z;
    try {
      new QRCode(document.getElementById('qrpop-'+z), {
        text: url, width:100, height:100,
        colorDark:'#fff', colorLight:'#080d1a',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e){}
  });
}

// ══════════════════════════════════════════════
// ZONE CONTROLS
// ══════════════════════════════════════════════
function selZoneColor(btn) {
  const z = btn.dataset.z;
  document.querySelectorAll('.zcbtn[data-z="'+z+'"]').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  zoneState[z].color = btn.dataset.c;
}

function selZoneFx(btn) {
  const z = btn.dataset.z;
  document.querySelectorAll('.zfxbtn[data-z="'+z+'"]').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  zoneState[z].fx = btn.dataset.f;
}

function sendZone(z) {
  if (isBlackoutAll) return;
  const st = zoneState[z];
  const cmd = {
    type:'command', color:st.color,
    colorHex: COLORS[st.color],
    effect: st.fx,
    blackout: false,
    ts: Date.now()
  };
  push('state/zona'+z, cmd);

  // Flash GO button
  const btn = document.getElementById('zgo-'+z);
  btn.style.boxShadow = '0 0 30px '+COLORS[st.color];
  setTimeout(() => btn.style.boxShadow='', 400);
  toast('ZONA '+z+' → '+st.color.toUpperCase()+' '+st.fx.toUpperCase());
}

function toggleZoneBlackout(z) {
  zoneState[z].blackout = !zoneState[z].blackout;
  const btn = document.getElementById('zbo-'+z);
  btn.classList.toggle('on', zoneState[z].blackout);
  push('state/zona'+z, { blackout: zoneState[z].blackout, ts: Date.now() });
}

function toggleBlackoutAll() {
  isBlackoutAll = !isBlackoutAll;
  document.getElementById('blackoutAllBtn').classList.toggle('on', isBlackoutAll);
  ZONE_NAMES.forEach(z => {
    push('state/zona'+z, { blackout: isBlackoutAll, ts: Date.now() });
    document.getElementById('zbo-'+z).classList.toggle('on', isBlackoutAll);
  });
  toast(isBlackoutAll ? '⬛ BLACKOUT TOTALE' : '▶ RIPRESO');
}

// ══════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════
async function startAux() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,channelCount:2}
    });
    setupAudio(s,'aux');
  } catch(e) { toast('AUX non disponibile — usa MIC'); }
}

async function startMic() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    setupAudio(s,'mic');
  } catch(e) { toast('Permesso microfono negato'); }
}

function setupAudio(s, mode) {
  stopAudio();
  stream = s;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = .75;
  audioSrc = audioCtx.createMediaStreamSource(s);
  audioSrc.connect(analyser);
  document.getElementById('auxBtn').style.cssText = mode==='aux'?'background:#0057ff;color:#fff;border-color:#0057ff':'';
  document.getElementById('micBtn').style.cssText = mode==='mic'?'background:#0057ff;color:#fff;border-color:#0057ff':'';
  document.getElementById('audioBadge').textContent = mode==='aux'?'⚡ AUX IN':'🎙 MICROFONO';
  document.getElementById('srcLabel').textContent = mode.toUpperCase();
  runAnalysis();
  toast(mode==='aux'?'AUX attivo':'Microfono attivo');
}

function stopAudio() {
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(audioSrc) audioSrc.disconnect();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=analyser=audioSrc=stream=null;
  document.getElementById('auxBtn').style.cssText='';
  document.getElementById('micBtn').style.cssText='';
  document.getElementById('audioBadge').textContent='NO AUDIO';
  document.getElementById('srcLabel').textContent='--';
}

function runAnalysis() {
  const fft = new Uint8Array(analyser.frequencyBinCount);
  const td  = new Float32Array(analyser.fftSize);
  function loop() {
    raf = requestAnimationFrame(loop);
    analyser.getByteFrequencyData(fft);
    analyser.getFloatTimeDomainData(td);
    const now = Date.now();
    const binHz = audioCtx.sampleRate / analyser.fftSize;
    const lo = Math.floor(60/binHz), hi = Math.floor(180/binHz);
    let sum = 0;
    for(let i=lo;i<=hi;i++) sum+=fft[i];
    const energy = sum/((hi-lo+1)*255);
    energyHist.push(energy);
    if(energyHist.length>80) energyHist.shift();
    const avg = energyHist.reduce((a,b)=>a+b)/energyHist.length;
    const sens = parseInt(document.getElementById('sensSlider').value);
    adaptThresh = avg*(1.3+(10-sens)*.12);
    const pct = Math.min(100,energy*200);
    const mf = document.getElementById('meterFill');
    mf.style.width = pct+'%';
    mf.className = 'meter-fill'+(energy>adaptThresh?' hot':'');
    document.getElementById('meterNum').textContent = Math.round(energy*100);
    const minGap = bpm>0?(60000/bpm)*.65:240;
    if(energy>adaptThresh && (now-lastBeatTs)>minGap) {
      lastBeatTs = now;
      onBeat(now);
    }
    if(document.getElementById('gridLock').checked && gridInterval>0) {
      const next = lastGridBeat+gridInterval;
      if(Math.abs(now-next)<35 && now>=next-35) {
        lastGridBeat = next;
        if((now-lastBeatTs)>120) onBeat(now, true);
      }
    }
    drawWave(td, energy);
    drawGrid(now);
  }
  loop();
}

function onBeat(ts, predicted=false) {
  beatCount++;
  document.getElementById('beatCount').textContent = beatCount;
  const led = document.getElementById('beatLed');
  led.classList.add('on');
  setTimeout(()=>led.classList.remove('on'),90);
  const bpmEl = document.getElementById('bpmNum');
  bpmEl.classList.add('flash');
  setTimeout(()=>bpmEl.classList.remove('flash'),70);
  beatHist.push(ts);
  if(beatHist.length>16) beatHist.shift();
  if(beatHist.length>=4) calcBPM();
  // Flash GO buttons di tutte le zone
  ZONE_NAMES.forEach(z => {
    const btn = document.getElementById('zgo-'+z);
    if(btn) { btn.classList.add('bp'); setTimeout(()=>btn.classList.remove('bp'),140); }
  });
  if(document.getElementById('autoBeat').checked && !isBlackoutAll) {
    const d = Math.max(0, latComp);
    setTimeout(() => {
      ZONE_NAMES.forEach(z => {
        if(!zoneState[z].blackout) {
          push('beat/zona'+z, { ts:Date.now(), colorHex: COLORS[zoneState[z].color] });
        }
      });
    }, d);
  }
}

function calcBPM() {
  if(beatHist.length<4) return;
  const ivs=[];
  for(let i=1;i<beatHist.length;i++) ivs.push(beatHist[i]-beatHist[i-1]);
  ivs.sort((a,b)=>a-b);
  const med=ivs[Math.floor(ivs.length/2)];
  const filt=ivs.filter(i=>Math.abs(i-med)<med*.3);
  if(filt.length<2) return;
  const avg=filt.reduce((a,b)=>a+b)/filt.length;
  const nb=Math.round(60000/avg);
  if(nb>40&&nb<220){
    bpm=nb; gridInterval=avg;
    lastGridBeat=beatHist[beatHist.length-1];
    document.getElementById('bpmNum').textContent=bpm;
    document.getElementById('bpmConf').textContent=Math.round(filt.length/ivs.length*100)+'%';
  }
}

function drawWave(td, energy) {
  wCvs.width=wCvs.offsetWidth; wCvs.height=wCvs.offsetHeight;
  const W=wCvs.width,H=wCvs.height;
  wCtx.clearRect(0,0,W,H);
  wCtx.beginPath();
  wCtx.strokeStyle=`rgba(0,87,255,${.35+energy*2})`;
  wCtx.lineWidth=1.5;
  const step=W/td.length;
  for(let i=0;i<td.length;i++){
    const x=i*step,y=(1-(td[i]+1)/2)*H;
    i===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);
  }
  wCtx.stroke();
  const ty=H*(1-adaptThresh*1.5);
  wCtx.setLineDash([3,3]);
  wCtx.strokeStyle='rgba(255,170,0,.25)';
  wCtx.lineWidth=1;
  wCtx.beginPath(); wCtx.moveTo(0,ty); wCtx.lineTo(W,ty); wCtx.stroke();
  wCtx.setLineDash([]);
}

function drawGrid(now) {
  gCvs.width=gCvs.offsetWidth; gCvs.height=gCvs.offsetHeight;
  const W=gCvs.width,H=gCvs.height;
  gCtx.fillStyle='#040810'; gCtx.fillRect(0,0,W,H);
  const win=4000,ppm=W/win;
  for(const ts of beatHist){
    const age=now-ts; if(age>win) continue;
    const x=W-age*ppm,al=1-age/win;
    gCtx.beginPath(); gCtx.arc(x,H/2,3.5,0,Math.PI*2);
    gCtx.fillStyle=`rgba(0,87,255,${al})`; gCtx.fill();
  }
  if(gridInterval>0){
    let pt=lastGridBeat;
    for(let i=0;i<10;i++){
      pt+=gridInterval;
      const age=now-pt; if(age>win) continue;
      const x=W-age*ppm;
      const al=age<0?.7:(1-age/win)*.35;
      const col=age<0?`rgba(0,230,118,${al})`:`rgba(255,170,0,${al})`;
      gCtx.save(); gCtx.translate(x,H/2); gCtx.rotate(Math.PI/4);
      gCtx.fillStyle=col; gCtx.fillRect(-2.5,-2.5,5,5);
      gCtx.restore();
    }
  }
  gCtx.strokeStyle='rgba(255,255,255,.1)'; gCtx.lineWidth=1;
  gCtx.beginPath(); gCtx.moveTo(W,0); gCtx.lineTo(W,H); gCtx.stroke();
}

function tapTempo() {
  const now=Date.now();
  tapTimes.push(now);
  if(tapTimes.length>8) tapTimes.shift();
  if(tapTimes.length>=2){
    const ivs=[];
    for(let i=1;i<tapTimes.length;i++) ivs.push(tapTimes[i]-tapTimes[i-1]);
    const avg=ivs.reduce((a,b)=>a+b)/ivs.length;
    bpm=Math.round(60000/avg);
    gridInterval=avg; lastGridBeat=now;
    document.getElementById('bpmNum').textContent=bpm;
    document.getElementById('bpmConf').textContent='TAP';
    toast('TAP BPM: '+bpm);
  }
}

function resetGrid() {
  beatHist.length=0; energyHist.length=0; tapTimes.length=0;
  bpm=0; gridInterval=0;
  document.getElementById('bpmNum').textContent='---';
  document.getElementById('bpmConf').textContent='--';
  toast('Grid resettata');
}

function syncNow() {
  lastGridBeat=Date.now();
  toast('SYNC ✓');
}

document.getElementById('sensSlider').addEventListener('input',function(){
  document.getElementById('sensVal').textContent=this.value;
});
document.getElementById('latSlider').addEventListener('input',function(){
  latComp=parseInt(this.value);
  document.getElementById('latVal').textContent=(latComp>=0?'+':'')+latComp+'ms';
});

setInterval(()=>{
  const ago=Date.now()-lastBeatTs;
  document.getElementById('lastBeat').textContent=lastBeatTs>0&&ago<60000?(ago/1000).toFixed(1)+'s':'--';
},100);

let toastTimer;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// INIT
buildZones();
</script>
