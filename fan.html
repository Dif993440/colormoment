<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>COLOR MOMENT</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
touch-action: none;
}

body {
font-family: ‘Oswald’, sans-serif;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
transition: background 0.08s ease;
}

/* ── FULL SCREEN COLOR ── */
#colorScreen {
position: fixed; inset: 0;
background: #000;
transition: background 0.06s;
z-index: 0;
}

/* ── EFFECTS LAYERS ── */
#flashLayer {
position: fixed; inset: 0;
background: #fff;
opacity: 0;
z-index: 5;
pointer-events: none;
}

#waveCanvas {
position: fixed; inset: 0;
z-index: 6;
pointer-events: none;
opacity: 0;
}

#rainbowLayer {
position: fixed; inset: 0;
background: linear-gradient(90deg, #f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
background-size: 200% 100%;
opacity: 0;
z-index: 7;
pointer-events: none;
animation: rainbowShift 3s linear infinite;
}
@keyframes rainbowShift { to { background-position: 200% 0; } }

/* ── HUD OVERLAY ── */
#hud {
position: fixed;
inset: 0;
z-index: 20;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
padding: 50px 24px 48px;
pointer-events: none;
}

.hud-top {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
}

.logo-text {
font-size: 1.1rem;
letter-spacing: .35em;
font-weight: 700;
color: rgba(255,255,255,.15);
text-transform: uppercase;
}

.hud-center {
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
}

.effect-name {
font-size: clamp(2rem, 10vw, 3.5rem);
font-weight: 700;
letter-spacing: .25em;
color: rgba(255,255,255,0);
text-shadow: none;
transition: color .15s, text-shadow .15s;
text-transform: uppercase;
}
.effect-name.visible {
color: rgba(255,255,255,.15);
}

.hud-bottom {
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
}

.status-row {
display: flex;
align-items: center;
gap: 8px;
}
.status-dot-fan {
width: 7px; height: 7px;
border-radius: 50%;
background: #333;
transition: background .3s, box-shadow .3s;
}
.status-dot-fan.on {
background: #00e676;
box-shadow: 0 0 10px #00e676;
animation: blink 2s infinite;
}
@keyframes blink { 0%,100% {opacity:1;} 50% {opacity:.4;} }

.status-text-fan {
font-size: .65rem;
letter-spacing: .2em;
text-transform: uppercase;
color: rgba(255,255,255,.2);
}

/* ── CONNECTING SCREEN ── */
#connectScreen {
position: fixed; inset: 0;
background: #000;
z-index: 100;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 28px;
padding: 40px;
}

.connect-logo {
font-size: clamp(2.2rem, 10vw, 3.5rem);
font-weight: 700;
letter-spacing: .2em;
background: linear-gradient(90deg, #0057ff, #e8000d);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-align: center;
line-height: 1.1;
}

.connect-sub {
font-size: .8rem;
letter-spacing: .2em;
text-transform: uppercase;
color: #444;
text-align: center;
}

.spinner {
width: 40px; height: 40px;
border: 2px solid #111;
border-top-color: #0057ff;
border-radius: 50%;
animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.connect-note {
font-size: .7rem;
color: #333;
text-align: center;
letter-spacing: .08em;
line-height: 1.6;
max-width: 280px;
}

/* Firebase config input (shown when needed) */
#fbConfigSection {
display: none;
flex-direction: column;
gap: 12px;
width: 100%;
max-width: 340px;
}
#fbConfigSection.show { display: flex; }

.fan-cfg-input {
width: 100%;
background: #0a0a0a;
border: 1px solid #1a1a2e;
color: #8aa4c8;
padding: 12px 14px;
font-family: ‘Oswald’, sans-serif;
font-size: .75rem;
letter-spacing: .03em;
outline: none;
height: 110px;
resize: none;
border-radius: 2px;
}
.fan-cfg-input::placeholder { color: #222; }
.fan-cfg-input:focus { border-color: #0057ff; }

.fan-connect-btn {
width: 100%;
height: 50px;
background: #0057ff;
border: none;
font-family: ‘Oswald’, sans-serif;
font-size: 1rem;
letter-spacing: .2em;
font-weight: 700;
color: #fff;
cursor: pointer;
text-transform: uppercase;
clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

/* ── BLACKOUT OVERLAY ── */
#blackoutOverlay {
position: fixed; inset:0;
background: #000;
opacity: 0;
z-index: 50;
pointer-events: none;
transition: opacity .3s;
}
#blackoutOverlay.on { opacity: 1; pointer-events: all; }

/* ── PULSE ANIMATION ── */
@keyframes pulseScale {
0% { transform: scale(1); }
50% { transform: scale(1.04); }
100% { transform: scale(1); }
}

#colorScreen.pulsing { animation: pulseScale 0.6s ease-in-out infinite; }

/* ── FADE ANIMATION ── */
@keyframes fadeInOut {
0%,100% { opacity: 0.2; }
50% { opacity: 1; }
}
#colorScreen.fading { animation: fadeInOut 1.8s ease-in-out infinite; }

/* Beat flash */
@keyframes beatFlash {
0% { opacity: 1; }
100% { opacity: 0; }
}
</style>

</head>
<body>

<!-- CONNECTING SCREEN -->

<div id="connectScreen">
  <div class="connect-logo">COLOR<br>MOMENT</div>
  <div class="connect-sub">Il pubblico diventa lo spettacolo</div>
  <div class="spinner" id="spinner"></div>
  <div class="connect-note" id="connectNote">Connessione in corso...</div>
</div>

<!-- MAIN SCREEN (hidden until connected) -->

<div id="colorScreen"></div>

<canvas id="waveCanvas"></canvas>

<div id="rainbowLayer"></div>
<div id="flashLayer"></div>
<div id="blackoutOverlay"></div>

<div id="hud">
  <div class="hud-top">
    <div class="logo-text">COLOR MOMENT</div>
  </div>
  <div class="hud-center">
    <div class="effect-name" id="effectNameDisplay"></div>
  </div>
  <div class="hud-bottom">
    <div class="status-row">
      <div class="status-dot-fan" id="fanStatusDot"></div>
      <div class="status-text-fan" id="fanStatusText">CONNESSIONE...</div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let firebaseDB = null;
let currentColor = '#000000';
let currentEffect = 'solid';
let isBlackout = false;
let waveAnim = null;

const colorScreen = document.getElementById('colorScreen');
const flashLayer = document.getElementById('flashLayer');
const rainbowLayer = document.getElementById('rainbowLayer');
const waveCanvas = document.getElementById('waveCanvas');
const blackoutOverlay = document.getElementById('blackoutOverlay');
const ctx = waveCanvas.getContext('2d');

// ─────────────────────────────────────────
// CANVAS RESIZE
// ─────────────────────────────────────────
function resizeCanvas() {
  waveCanvas.width = window.innerWidth;
  waveCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─────────────────────────────────────────
// FIREBASE — AUTO INIT (config hardcoded)
// ─────────────────────────────────────────
const FIREBASE_CFG = {
  apiKey: "AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain: "color-moment-3e8ac.firebaseapp.com",
  databaseURL: "https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "color-moment-3e8ac",
  storageBucket: "color-moment-3e8ac.firebasestorage.app",
  messagingSenderId: "330719548656",
  appId: "1:330719548656:web:b0d5d63615a1998b2b5e35"
};

try {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CFG);
  firebaseDB = firebase.database();
  onFanConnected();
} catch(e) {
  document.getElementById('connectNote').textContent = '⚠ Errore: ' + e.message;
}

function onFanConnected() {
  // Hide connect screen
  document.getElementById('connectScreen').style.transition = 'opacity .5s';
  document.getElementById('connectScreen').style.opacity = '0';
  setTimeout(() => document.getElementById('connectScreen').style.display = 'none', 500);

  // Update status
  document.getElementById('fanStatusDot').classList.add('on');
  document.getElementById('fanStatusText').textContent = 'CONNESSO';

  // Register this fan
  const fanRef = firebaseDB.ref('fans/count');
  fanRef.transaction(c => (c || 0) + 1);
  // OTT: onDisconnect gestito da Firebase — più affidabile di beforeunload su iOS
  firebaseDB.ref('fans/count').onDisconnect().transaction(c => Math.max(0, (c || 1) - 1));

  // Listen for state changes (main command)
  firebaseDB.ref('state').on('value', snap => {
    const cmd = snap.val();
    if (!cmd) return;
    applyCommand(cmd);
  });

  // Listen for beat flashes
  // OTT: finestra 500ms invece di 300ms — più tollerante sulla rete
  let lastBeatTs = 0;
  firebaseDB.ref('beat').on('value', snap => {
    const beat = snap.val();
    if (!beat) return;
    const age = Date.now() - beat.ts;
    if (age >= 0 && age < 500 && beat.ts !== lastBeatTs) {
      lastBeatTs = beat.ts;
      doBeatFlash(beat.colorHex);
    }
  });

  // Keep screen on
  requestWakeLock();

  // OTT: richiedi wake lock ogni volta che torna in foreground (iOS Safari)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
}

// ─────────────────────────────────────────
// COMMAND APPLICATION
// ─────────────────────────────────────────
function applyCommand(cmd) {
  if (cmd.blackout) {
    blackoutOverlay.classList.add('on');
    isBlackout = true;
    return;
  }

  blackoutOverlay.classList.remove('on');
  isBlackout = false;

  currentColor = cmd.colorHex || '#000';
  currentEffect = cmd.effect || 'solid';

  // Reset all effects
  stopAllEffects();

  // Apply color
  colorScreen.style.background = currentColor;

  // Apply effect
  const label = document.getElementById('effectNameDisplay');
  label.textContent = currentEffect.toUpperCase();
  label.classList.add('visible');

  switch (currentEffect) {
    case 'solid':
      // just solid color
      break;
    case 'flash':
      startFlash();
      break;
    case 'wave':
      startWave(currentColor);
      break;
    case 'rainbow':
      rainbowLayer.style.opacity = '0.9';
      colorScreen.style.background = '#000';
      break;
    case 'pulse':
      colorScreen.classList.add('pulsing');
      break;
    case 'fade':
      colorScreen.classList.add('fading');
      break;
  }
}

function stopAllEffects() {
  clearInterval(flashInterval);
  flashLayer.style.opacity = '0';
  rainbowLayer.style.opacity = '0';
  colorScreen.classList.remove('pulsing', 'fading');
  waveCanvas.style.opacity = '0';
  if (waveAnim) { cancelAnimationFrame(waveAnim); waveAnim = null; }
}

// ─────────────────────────────────────────
// EFFECTS
// ─────────────────────────────────────────
let flashInterval;
function startFlash() {
  let on = true;
  flashInterval = setInterval(() => {
    flashLayer.style.opacity = on ? '0.85' : '0';
    on = !on;
  }, 160);
}

function startWave(hexColor) {
  waveCanvas.style.opacity = '1';
  colorScreen.style.background = 'rgba(0,0,0,0.7)';
  let t = 0;
  const rgb = hexToRgb(hexColor);

  function drawWave() {
    waveAnim = requestAnimationFrame(drawWave);
    ctx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
    t += 0.04;
    const W = waveCanvas.width;
    const H = waveCanvas.height;
    const lines = 5;
    for (let l = 0; l < lines; l++) {
      const offset = (l / lines) * Math.PI * 2;
      const amp = H * 0.08 + l * 10;
      const freq = 0.008 - l * 0.001;
      const alpha = 0.5 - l * 0.08;

      ctx.beginPath();
      ctx.moveTo(0, H / 2);
      for (let x = 0; x <= W; x += 4) {
        const y = H / 2 + Math.sin(x * freq + t + offset) * amp;
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
      ctx.lineWidth = 3 - l * 0.3;
      ctx.stroke();
    }
  }
  drawWave();
}

function doBeatFlash(hexColor) {
  if (isBlackout) return;
  // Vibrate
  if (navigator.vibrate) navigator.vibrate([80]);

  // Flash white
  flashLayer.style.transition = 'opacity 0.04s';
  flashLayer.style.opacity = '1';
  setTimeout(() => {
    flashLayer.style.transition = 'opacity 0.12s';
    flashLayer.style.opacity = '0';
  }, 60);
}

// ─────────────────────────────────────────
// WAKE LOCK — mantieni schermo acceso
// ─────────────────────────────────────────
let wakeLockObj = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      if (wakeLockObj) return; // già attivo
      wakeLockObj = await navigator.wakeLock.request('screen');
      wakeLockObj.addEventListener('release', () => {
        wakeLockObj = null; // resetta così può essere richiesto di nuovo
      });
    }
  } catch(e) {}
}

// ─────────────────────────────────────────
// SERVICE WORKER — cache Firebase SDK
// ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : { r: 255, g: 255, b: 255 };
}
</script>

</body>
</html>
