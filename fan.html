<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>COLOR MOMENT</title>

<!-- FIX 1: Firebase caricato staticamente — no dynamic import, funziona su Safari -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#s{position:fixed;inset:0;background:#000;transition:background .06s;z-index:0}
#f{position:fixed;inset:0;background:#fff;opacity:0;z-index:5;pointer-events:none}
#w{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0}
#r{position:fixed;inset:0;background:linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f,#f00);background-size:200% 100%;opacity:0;z-index:7;pointer-events:none;animation:rs 3s linear infinite}
@keyframes rs{to{background-position:200% 0}}
#b{position:fixed;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none;transition:opacity .3s}
#b.on{opacity:1;pointer-events:all}
#hud{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:50px 24px 48px;pointer-events:none}
.logo{font-size:1rem;letter-spacing:.35em;font-weight:700;color:rgba(255,255,255,.1);text-transform:uppercase}
.fx{font-size:clamp(2rem,10vw,3.5rem);font-weight:700;letter-spacing:.25em;color:rgba(255,255,255,0);text-transform:uppercase;transition:color .15s}
.fx.v{color:rgba(255,255,255,.12)}
.sr{display:flex;align-items:center;gap:8px}
.sd{width:7px;height:7px;border-radius:50%;background:#222;transition:background .3s,box-shadow .3s}
.sd.on{background:#00e676;box-shadow:0 0 10px #00e676;animation:bl 2s infinite}
.sd.warn{background:#ffaa00;box-shadow:0 0 10px #ffaa00;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.st{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.15)}
#c{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.cl{font-size:clamp(2.2rem,10vw,3.5rem);font-weight:800;letter-spacing:.2em;background:linear-gradient(90deg,#0057ff,#e8000d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1.1}
.cs{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:#333;text-align:center}
.sp{width:36px;height:36px;border:2px solid #111;border-top-color:#0057ff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.cn{font-size:.65rem;color:#2a2a2a;text-align:center;letter-spacing:.06em;line-height:1.6;max-width:260px}
@keyframes pS{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
#s.pulsing{animation:pS .6s ease-in-out infinite}
@keyframes fO{0%,100%{opacity:.2}50%{opacity:1}}
#s.fading{animation:fO 1.8s ease-in-out infinite}
</style>

</head>
<body>

<div id="c">
  <div class="cl">COLOR<br>MOMENT</div>
  <div class="cs">Il pubblico diventa lo spettacolo</div>
  <div class="sp"></div>
  <div class="cn" id="cn">Connessione in corso...</div>
</div>

<div id="s"></div>
<canvas id="w"></canvas>
<div id="r"></div>
<div id="f"></div>
<div id="b"></div>

<div id="hud">
  <div class="logo">COLOR MOMENT</div>
  <div class="fx" id="fx"></div>
  <div class="sr">
    <div class="sd" id="sd"></div>
    <div class="st" id="st">CONNESSIONE...</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────
const CFG = {
  apiKey: "AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain: "color-moment-3e8ac.firebaseapp.com",
  databaseURL: "https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "color-moment-3e8ac",
  storageBucket: "color-moment-3e8ac.firebasestorage.app",
  messagingSenderId: "330719548656",
  appId: "1:330719548656:web:b0d5d63615a1998b2b5e35"
};

// ─────────────────────────────────────────────────────
// ELEMENTS
// ─────────────────────────────────────────────────────
const S   = document.getElementById('s');
const F   = document.getElementById('f');
const R   = document.getElementById('r');
const W   = document.getElementById('w');
const B   = document.getElementById('b');
const FX  = document.getElementById('fx');
const SD  = document.getElementById('sd');
const ST  = document.getElementById('st');
const CN  = document.getElementById('cn');
const ctx = W.getContext('2d');

let wAnim = null, flashInt = null, isBlackout = false;
let db = null, reconnectTimer = null, reconnectAttempt = 0;
let lastState = null, lastBeatTs = 0;

// ─────────────────────────────────────────────────────
// CANVAS RESIZE
// ─────────────────────────────────────────────────────
function resize() { W.width = innerWidth; W.height = innerHeight; }
resize();
addEventListener('resize', resize);

// ─────────────────────────────────────────────────────
// FIX 1: WAKE LOCK — schermo sempre acceso
// Previene iOS Safari throttling in background
// ─────────────────────────────────────────────────────
let wakeLockObj = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLockObj = await navigator.wakeLock.request('screen');
      // Se il wake lock viene rilasciato (es. cambio tab), lo richiede di nuovo
      wakeLockObj.addEventListener('release', () => {
        setTimeout(requestWakeLock, 1000);
      });
    }
  } catch(e) {}
}

// Richiedi wake lock anche quando la pagina torna in foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    requestWakeLock();
    // FIX 2: Reconnect se la connessione è caduta mentre era in background
    if (db) checkConnection();
  }
});

// ─────────────────────────────────────────────────────
// FIX 2: RECONNECT AUTOMATICO con backoff esponenziale
// Gestisce iOS drop, handoff 4G/WiFi, cadute di rete
// ─────────────────────────────────────────────────────
function setStatus(stato) {
  if (stato === 'connected') {
    SD.className = 'sd on';
    ST.textContent = 'CONNESSO';
    reconnectAttempt = 0;
  } else if (stato === 'reconnecting') {
    SD.className = 'sd warn';
    ST.textContent = 'RICONNESSIONE...';
  } else {
    SD.className = 'sd';
    ST.textContent = 'OFFLINE';
  }
}

function checkConnection() {
  if (!db) return;
  // Verifica connessione Firebase tramite .info/connected
  db.ref('.info/connected').once('value', snap => {
    if (!snap.val()) scheduleReconnect();
  });
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  setStatus('reconnecting');
  // Backoff esponenziale: 1s, 2s, 4s, 8s, max 30s
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempt), 30000);
  reconnectAttempt++;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    initFirebase();
  }, delay);
}

// ─────────────────────────────────────────────────────
// FIREBASE INIT
// ─────────────────────────────────────────────────────
function initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(CFG);
    db = firebase.database();

    // Monitor connessione in tempo reale
    db.ref('.info/connected').on('value', snap => {
      if (snap.val() === true) {
        onConnected();
      } else {
        // Disconnesso — schedula reconnect solo se non è il primo avvio
        if (reconnectAttempt > 0) scheduleReconnect();
      }
    });

  } catch(e) {
    CN.textContent = '⚠ ' + e.message;
    scheduleReconnect();
  }
}

function onConnected() {
  // Nascondi schermata di connessione
  const cs = document.getElementById('c');
  if (cs) {
    cs.style.transition = 'opacity .4s';
    cs.style.opacity = '0';
    setTimeout(() => cs.style.display = 'none', 400);
  }

  setStatus('connected');
  requestWakeLock();

  // Registra fan (con gestione disconnessione)
  const fanRef = db.ref('fans/count');
  const onDisconnect = db.ref('fans/count');
  fanRef.transaction(c => (c || 0) + 1);
  db.ref('fans/count').onDisconnect().transaction(c => Math.max(0, (c || 1) - 1));

  // FIX 3: Riapplica ultimo stato noto dopo riconnessione
  // Così chi si riconnette vede subito il colore corrente
  db.ref('state').on('value', snap => {
    const cmd = snap.val();
    if (cmd) {
      lastState = cmd;
      applyCmd(cmd);
    }
  });

  // Beat con validazione temporale stretta
  db.ref('beat').on('value', snap => {
    const beat = snap.val();
    if (!beat) return;
    // FIX 4: Finestra di tolleranza 500ms invece di 300ms
    // Compensa varianza di rete senza perdere beat
    const age = Date.now() - beat.ts;
    if (age >= 0 && age < 500 && beat.ts !== lastBeatTs) {
      lastBeatTs = beat.ts;
      doBeat();
    }
  });
}

// ─────────────────────────────────────────────────────
// APPLY COMMAND
// ─────────────────────────────────────────────────────
function applyCmd(cmd) {
  if (cmd.blackout) {
    B.classList.add('on');
    isBlackout = true;
    return;
  }
  B.classList.remove('on');
  isBlackout = false;

  stopFx();
  S.style.background = cmd.colorHex || '#000';
  FX.textContent = (cmd.effect || '').toUpperCase();
  FX.classList.add('v');

  switch(cmd.effect) {
    case 'flash':   startFlash(); break;
    case 'wave':    startWave(cmd.colorHex || '#fff'); break;
    case 'rainbow': R.style.opacity = '.9'; S.style.background = '#000'; break;
    case 'pulse':   S.classList.add('pulsing'); break;
    case 'fade':    S.classList.add('fading'); break;
  }
}

function stopFx() {
  clearInterval(flashInt);
  F.style.opacity = '0';
  R.style.opacity = '0';
  S.classList.remove('pulsing','fading');
  W.style.opacity = '0';
  if (wAnim) { cancelAnimationFrame(wAnim); wAnim = null; }
}

// ─────────────────────────────────────────────────────
// EFFECTS
// ─────────────────────────────────────────────────────
function startFlash() {
  let on = true;
  flashInt = setInterval(() => {
    F.style.opacity = on ? '.85' : '0';
    on = !on;
  }, 160);
}

function startWave(hex) {
  W.style.opacity = '1';
  S.style.background = 'rgba(0,0,0,.7)';
  const {r,g,b} = hexRgb(hex);
  let t = 0;
  (function loop() {
    wAnim = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W.width, W.height);
    t += .04;
    for (let l = 0; l < 5; l++) {
      const off = (l/5)*Math.PI*2;
      const amp = W.height*.08 + l*10;
      const freq = .008 - l*.001;
      const alpha = .5 - l*.08;
      ctx.beginPath();
      ctx.moveTo(0, W.height/2);
      for (let x = 0; x <= W.width; x += 4)
        ctx.lineTo(x, W.height/2 + Math.sin(x*freq+t+off)*amp);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth = 3 - l*.3;
      ctx.stroke();
    }
  })();
}

function doBeat() {
  if (isBlackout) return;
  if (navigator.vibrate) navigator.vibrate([80]);
  F.style.transition = 'opacity .04s';
  F.style.opacity = '1';
  setTimeout(() => {
    F.style.transition = 'opacity .12s';
    F.style.opacity = '0';
  }, 60);
}

// ─────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────
function hexRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r
    ? {r:parseInt(r[1],16), g:parseInt(r[2],16), b:parseInt(r[3],16)}
    : {r:255, g:255, b:255};
}

// ─────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────
initFirebase();
</script>

<!-- FIX 5: SERVICE WORKER — cache Firebase SDK per accessi futuri -->

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
