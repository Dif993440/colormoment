<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>COLOR MOMENT</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#000 !important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

#screen{position:fixed;inset:0;background:#000;transition:background .08s;z-index:0}
#flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:5;pointer-events:none}
#wave{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0}
#rainbow{
position:fixed;inset:0;
background:linear-gradient(90deg,#f00,#f80,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
background-size:200% 100%;
opacity:0;z-index:7;pointer-events:none;
animation:rshift 3s linear infinite;
}
@keyframes rshift{to{background-position:200% 0}}
#blackout{position:fixed;inset:0;background:#000;opacity:0;z-index:50;pointer-events:none;transition:opacity .3s}
#blackout.on{opacity:1;pointer-events:all}

/* HUD */
#hud{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:52px 24px 50px;pointer-events:none}
.hud-logo{font-size:.9rem;letter-spacing:.4em;font-weight:700;color:rgba(255,255,255,.08);text-transform:uppercase}
.hud-fx{font-size:clamp(1.8rem,9vw,3rem);font-weight:700;letter-spacing:.25em;color:rgba(255,255,255,0);text-transform:uppercase;transition:color .15s}
.hud-fx.show{color:rgba(255,255,255,.1)}
.hud-status{display:flex;align-items:center;gap:7px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#1a1a1a;transition:background .3s,box-shadow .3s}
.status-dot.on{background:#00e676;box-shadow:0 0 10px #00e676;animation:blink 2s infinite}
.status-dot.warn{background:#ffaa00;box-shadow:0 0 10px #ffaa00}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.status-txt{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.15)}

/* CONNECT SCREEN */
#connect{
position:fixed;inset:0;background:#000;z-index:100;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px;
}
.cn-logo{
font-size:clamp(2rem,10vw,3.2rem);font-weight:800;letter-spacing:.2em;text-align:center;line-height:1.1;
background:linear-gradient(90deg,#0057ff,#e8000d);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cn-sub{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#333;text-align:center}
.spinner{width:34px;height:34px;border:2px solid #111;border-top-color:#0057ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cn-note{font-size:.62rem;color:#282828;text-align:center;letter-spacing:.06em;line-height:1.6;max-width:260px}

/* Pulse/fade effects */
@keyframes pulseS{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
#screen.pulsing{animation:pulseS .6s ease-in-out infinite}
@keyframes fadeS{0%,100%{opacity:.15}50%{opacity:1}}
#screen.fading{animation:fadeS 1.8s ease-in-out infinite}
</style>

</head>
<body>

<div id="connect">
  <div class="cn-logo">COLOR<br>MOMENT</div>
  <div class="cn-sub">Il pubblico diventa lo spettacolo</div>
  <div class="spinner" id="spinner"></div>
  <div class="cn-note" id="cnNote">Connessione in corso...</div>
</div>

<div id="screen"></div>
<canvas id="wave"></canvas>
<div id="rainbow"></div>
<div id="flash"></div>
<div id="blackout"></div>

<div id="hud">
  <div class="hud-logo">Color Moment</div>
  <div class="hud-fx" id="fxLabel"></div>
  <div class="hud-status">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">CONNESSIONE...</div>
  </div>
</div>

<script>
// ─── DEBUG PANEL — definito PRIMA di tutto ───
function dbg(msg) {
  let el = document.getElementById('dbgPanel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'dbgPanel';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,.85);color:#0f0;font-size:11px;padding:6px 10px;font-family:monospace;max-height:120px;overflow-y:auto;';
    document.body.appendChild(el);
  }
  const line = document.createElement('div');
  line.textContent = new Date().toISOString().substr(11,8) + ' ' + msg;
  el.insertBefore(line, el.firstChild);
  if (el.children.length > 8) el.removeChild(el.lastChild);
}

// ─── CONFIG ───
const CFG = {
  apiKey:"AIzaSyAyAT80EP_gCc7swPIwAXOv33z6zaw1bDQ",
  authDomain:"color-moment-3e8ac.firebaseapp.com",
  databaseURL:"https://color-moment-3e8ac-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"color-moment-3e8ac",
  storageBucket:"color-moment-3e8ac.firebasestorage.app",
  messagingSenderId:"330719548656",
  appId:"1:330719548656:web:b0d5d63615a1998b2b5e35"
};

// ─── ELEMENTS ───
const SCR  = document.getElementById('screen');
const FL   = document.getElementById('flash');
const RB   = document.getElementById('rainbow');
const WCV  = document.getElementById('wave');
const BLK  = document.getElementById('blackout');
const FXL  = document.getElementById('fxLabel');
const DOT  = document.getElementById('statusDot');
const TXT  = document.getElementById('statusTxt');
const NOTE = document.getElementById('cnNote');
const wCtx = WCV.getContext('2d');

// ─── STATE ───
let flashInterval = null;
let waveRaf = null;
let isBlackout = false;
let lastBeatTs = 0;
// Flag — listeners aggiunti una sola volta
let listenersAttached = false;

// ─── CANVAS SIZE ───
function resizeWave() { WCV.width = innerWidth; WCV.height = innerHeight; }
resizeWave();
addEventListener('resize', resizeWave);

// ─── FIREBASE ───
firebase.initializeApp(CFG);
const db = firebase.database();

// Connessione — usa .info/connected per stato reale
db.ref('.info/connected').on('value', snap => {
  if (snap.val() === true) {
    onConnected();
  } else {
    DOT.className = 'status-dot warn';
    TXT.textContent = 'RICONNESSIONE...';
  }
});

// Timeout Safari — se non connette in 12s avvisa
const safariTimeout = setTimeout(() => {
  if (document.getElementById('connect').style.display !== 'none') {
    NOTE.textContent = 'Connessione lenta. Ricarica la pagina.';
    NOTE.style.color = '#ffaa00';
    document.getElementById('spinner').style.display = 'none';
  }
}, 12000);

function onConnected() {
  clearTimeout(safariTimeout);
  dbg('onConnected called, listeners: ' + listenersAttached);

  // Nascondi connect screen
  const cs = document.getElementById('connect');
  cs.style.transition = 'opacity .4s';
  cs.style.opacity = '0';
  setTimeout(() => { cs.style.display = 'none'; }, 400);

  // Status
  DOT.className = 'status-dot on';
  TXT.textContent = 'CONNESSO';

  // Conta fan — con gestione disconnessione automatica
  const fanRef = db.ref('fans/count');
  fanRef.transaction(c => (c || 0) + 1);
  fanRef.onDisconnect().transaction(c => Math.max(0, (c || 1) - 1));

  // ─── LISTENERS — attaccati UNA SOLA VOLTA ───
  if (listenersAttached) return;
  listenersAttached = true;
  dbg('Attaching listeners...');

  try {
    // Ascolta comandi dalla regia
    db.ref('state').on('value', snap => {
      const cmd = snap.val();
      dbg('STATE received: ' + (cmd ? JSON.stringify(cmd).substr(0,60) : 'null'));
      if (cmd) applyCommand(cmd);
    });
    dbg('state listener OK');

    // Ascolta beat
    db.ref('beat').on('value', snap => {
      const beat = snap.val();
      if (!beat) return;
      const age = Date.now() - beat.ts;
      if (age >= 0 && age < 600 && beat.ts !== lastBeatTs) {
        lastBeatTs = beat.ts;
        doBeat();
      }
    });
    dbg('beat listener OK');

  } catch(e) {
    dbg('ERRORE listener: ' + e.message);
  }

  // Wake lock — schermo sempre acceso
  requestWakeLock();
}

// ─── APPLY COMMAND ───
function applyCommand(cmd) {
  dbg('CMD: ' + JSON.stringify(cmd).substr(0,80));

  if (cmd.blackout) {
    BLK.classList.add('on');
    isBlackout = true;
    dbg('BLACKOUT ON');
    return;
  }

  BLK.classList.remove('on');
  isBlackout = false;

  stopAllEffects();

  const hex = cmd.colorHex || '#000000';
  dbg('Applying hex: ' + hex + ' effect: ' + cmd.effect);

  // Forza colore con !important via setAttribute
  SCR.setAttribute('style', 'position:fixed;inset:0;z-index:0;transition:background .08s;background:' + hex + ' !important;');

  FXL.textContent = (cmd.effect || '').toUpperCase();
  FXL.className = 'hud-fx show';

  switch (cmd.effect) {
    case 'flash':   startFlash(); break;
    case 'wave':    startWave(hex); break;
    case 'rainbow': RB.style.opacity = '.9'; SCR.style.background = '#000'; break;
    case 'pulse':   SCR.classList.add('pulsing'); break;
    case 'fade':    SCR.classList.add('fading'); break;
  }

  dbg('Done. SCR bg: ' + SCR.style.background);
}

function stopAllEffects() {
  clearInterval(flashInterval);
  FL.style.opacity = '0';
  RB.style.opacity = '0';
  SCR.classList.remove('pulsing', 'fading');
  WCV.style.opacity = '0';
  if (waveRaf) { cancelAnimationFrame(waveRaf); waveRaf = null; }
}

// ─── FLASH ───
function startFlash() {
  let on = true;
  flashInterval = setInterval(() => {
    FL.style.opacity = on ? '.85' : '0';
    on = !on;
  }, 160);
}

// ─── WAVE ───
function startWave(hex) {
  WCV.style.opacity = '1';
  SCR.style.background = 'rgba(0,0,0,.7)';
  const {r,g,b} = hexRGB(hex);
  let t = 0;
  (function loop() {
    waveRaf = requestAnimationFrame(loop);
    wCtx.clearRect(0, 0, WCV.width, WCV.height);
    t += .04;
    for (let l = 0; l < 5; l++) {
      const off   = (l/5) * Math.PI * 2;
      const amp   = WCV.height * .08 + l * 10;
      const freq  = .008 - l * .001;
      const alpha = .5 - l * .08;
      wCtx.beginPath();
      wCtx.moveTo(0, WCV.height/2);
      for (let x = 0; x <= WCV.width; x += 4)
        wCtx.lineTo(x, WCV.height/2 + Math.sin(x*freq + t + off) * amp);
      wCtx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      wCtx.lineWidth = 3 - l * .3;
      wCtx.stroke();
    }
  })();
}

// ─── BEAT FLASH ───
function doBeat() {
  if (isBlackout) return;
  if (navigator.vibrate) navigator.vibrate([80]);
  FL.style.transition = 'opacity .04s';
  FL.style.opacity = '1';
  setTimeout(() => {
    FL.style.transition = 'opacity .14s';
    FL.style.opacity = '0';
  }, 60);
}

// ─── WAKE LOCK ───
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator)
      await navigator.wakeLock.request('screen');
  } catch(e) {}
}

// Richiedi wake lock quando torna in foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── UTILS ───
function hexRGB(hex) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return m
    ? { r:parseInt(m[1],16), g:parseInt(m[2],16), b:parseInt(m[3],16) }
    : { r:255, g:255, b:255 };
}
</script>

<script>
// Service Worker — cache Firebase SDK per caricamento istantaneo
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</body>
</html>
